<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0E2A33">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Grand Tour">
<meta name="description" content="Private travel companion — Belgium, Luxembourg, Alsace & Switzerland, July 2026">
<title>Grand Tour 2026 · Travel Companion</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230E2A33'/%3E%3Cg fill='none' stroke='%23C99A4A' stroke-width='3'%3E%3Ccircle cx='32' cy='32' r='17'/%3E%3C/g%3E%3Cpath d='M32 17 L37 32 L32 47 L27 32 Z' fill='%23C99A4A'/%3E%3C/svg%3E">
<style>
/* ============ TOKENS ============ */
:root{
  --ink:#23211C;            /* primary text */
  --ink-soft:#5A5344;       /* secondary text */
  --paper:#FAF6EE;          /* ticket-stock page */
  --paper-2:#F2EBDC;        /* slightly deeper paper */
  --card:#FFFDF8;           /* raised card */
  --line:#E2D8C4;           /* hairline on paper */
  --night:#0E2A33;          /* night-train chrome */
  --night-2:#15333D;
  --brass:#B8893E;          /* luggage hardware */
  --brass-bright:#C99A4A;
  --brass-tint:#F4E9D2;
  /* per-leg accents */
  --be:#C8941E;  --lu:#3E6B8C;  --fr:#A8423C;  --ch:#2F6B4F;  --transit:#7A6A52;
  --accent:var(--brass);      /* live leg accent, set by JS */
  --accent-tint:#F4E9D2;
  --radius:14px;
  --shadow:0 1px 2px rgba(28,40,44,.06), 0 8px 24px rgba(28,40,44,.07);
  --tap:44px;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:"SF Mono",ui-monospace,"Roboto Mono","DejaVu Sans Mono",Menlo,Consolas,monospace;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--sans); color:var(--ink);
  background:var(--paper);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  overscroll-behavior-y:none;
}
/* subtle paper grain via layered gradients (no external asset) */
body::before{
  content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
  background:
    radial-gradient(120% 80% at 50% -10%, rgba(201,154,74,.06), transparent 60%),
    repeating-linear-gradient(0deg, rgba(0,0,0,.012) 0 1px, transparent 1px 3px);
}
a{color:inherit}
button{font-family:inherit}

/* ============ TOP BAR ============ */
.topbar{
  position:sticky; top:0; z-index:40;
  background:linear-gradient(180deg,var(--night),var(--night-2));
  color:#F3ECDD; padding:calc(env(safe-area-inset-top,0px) + 9px) 16px 9px;
  display:flex; align-items:center; gap:12px;
  border-bottom:1px solid rgba(201,154,74,.28);
  box-shadow:0 1px 0 rgba(0,0,0,.25);
}
.brand{display:flex;flex-direction:column;line-height:1;min-width:0}
.brand .mono{font-family:var(--mono);font-size:10px;letter-spacing:.32em;color:var(--brass-bright);text-transform:uppercase}
.brand .ttl{font-family:var(--serif);font-size:16px;letter-spacing:.01em;margin-top:3px;color:#FBF5E8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.leg-pill{
  margin-left:auto;display:flex;align-items:center;gap:7px;flex-shrink:0;
  background:rgba(255,255,255,.08); border:1px solid var(--accent);
  color:#F3ECDD;border-radius:999px;padding:5px 11px 5px 9px;
  font-size:11px;font-weight:600;letter-spacing:.02em;
}
.leg-pill .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 28%,transparent)}
.leg-pill .flag{font-size:14px}

/* ============ LAYOUT ============ */
#app{max-width:680px;margin:0 auto;padding:16px 14px calc(96px + var(--safe-b))}
.view{animation:fade .28s ease both}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--brass);font-weight:600}
.h-section{font-family:var(--serif);font-size:21px;font-weight:600;margin:4px 0 0;letter-spacing:.01em}
.sub{color:var(--ink-soft);font-size:13.5px;line-height:1.5}
.section-head{margin:26px 4px 12px}
.section-head:first-child{margin-top:6px}

/* ============ CARD ============ */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card.pad{padding:16px}

/* ============ DEPARTURE BOARD HERO ============ */
.board{
  position:relative;overflow:hidden;border-radius:18px;color:#F4ECDC;
  background:linear-gradient(160deg,var(--night) 0%, #0b232b 55%, #0a1f26 100%);
  border:1px solid rgba(201,154,74,.35);
  box-shadow:var(--shadow);
}
.board::after{content:"";position:absolute;left:0;right:0;top:0;height:4px;background:var(--accent)}
.board .inner{padding:18px 18px 20px}
.board .status{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--brass-bright)}
.board .status .blink{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:blink 2.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:.35}50%{opacity:1}}
.board .bigdate{font-family:var(--serif);font-size:13px;color:#cdbf9f;margin-top:12px;letter-spacing:.02em}
.board h1{font-family:var(--serif);font-size:27px;line-height:1.12;margin:5px 0 0;font-weight:600;color:#FCF6EA}
.board .road{color:#d8cdb2;font-size:14px;margin-top:7px;line-height:1.45}
.board .legrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.tag{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:5px 10px;border-radius:999px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);color:#ece2cc}
.tag .ic{opacity:.9}
.board .quick{display:grid;grid-template-columns:1fr 1fr;gap:1px;margin-top:16px;background:rgba(201,154,74,.22);border-radius:12px;overflow:hidden}
.board .quick div{background:rgba(8,24,29,.6);padding:11px 12px}
.board .quick .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--brass-bright)}
.board .quick .v{font-size:12.5px;color:#e9dfc8;margin-top:3px;line-height:1.35}

.flipgo{display:flex;gap:9px;margin-top:14px}
.btn{
  -webkit-appearance:none;appearance:none;border:0;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  min-height:var(--tap);padding:0 16px;border-radius:11px;font-size:14px;font-weight:600;
  letter-spacing:.01em;transition:transform .08s ease, filter .15s ease;
}
.btn:active{transform:translateY(1px)}
.btn.primary{background:var(--accent);color:#fff}
.btn.ghost{background:rgba(255,255,255,.07);color:#f0e7d2;border:1px solid rgba(255,255,255,.2)}
.btn.block{width:100%}

/* ============ CALLOUTS ============ */
.callout{display:flex;gap:11px;padding:13px 14px;border-radius:12px;background:var(--brass-tint);border:1px solid color-mix(in srgb,var(--accent) 34%,var(--line));margin-top:10px}
.callout .bar{width:3px;border-radius:3px;background:var(--accent);flex:0 0 3px}
.callout .ttl{font-weight:700;font-size:13px;color:#4a3a1c}
.callout .bd{font-size:13px;color:#5b4d33;line-height:1.5;margin-top:3px}

/* ============ TIMETABLE ============ */
.timetable{position:relative;margin-top:6px;padding-left:4px}
.tt-row{display:grid;grid-template-columns:62px 1fr;gap:12px;position:relative;padding:9px 0}
.tt-row:not(:last-child)::before{content:"";position:absolute;left:73px;top:24px;bottom:-9px;width:2px;background:linear-gradient(var(--line),var(--line))}
.tt-time{font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:600;text-align:right;padding-top:1px;letter-spacing:.01em}
.tt-plan{position:relative;font-size:14px;line-height:1.4;color:var(--ink);padding-left:18px}
.tt-plan::before{content:"";position:absolute;left:-1px;top:5px;width:9px;height:9px;border-radius:50%;background:var(--card);border:2.5px solid var(--accent)}

/* ============ STOPS ============ */
.stop{display:flex;gap:13px;padding:14px;border-bottom:1px solid var(--line)}
.stop:last-child{border-bottom:0}
.stop .num{flex:0 0 28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12.5px;font-weight:700;margin-top:1px}
.stop .body{min-width:0;flex:1}
.stop .name{font-family:var(--serif);font-size:16px;font-weight:600;line-height:1.2}
.stop .desc{font-size:13px;color:var(--ink-soft);line-height:1.5;margin-top:5px}
.stop .addr{display:inline-flex;align-items:center;gap:6px;margin-top:9px;font-size:12px;color:var(--accent);font-weight:600;text-decoration:none}
.maplink{display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-weight:600;font-size:12.5px;color:var(--accent);
  border:1px solid color-mix(in srgb,var(--accent) 40%,var(--line));border-radius:9px;padding:7px 11px;background:color-mix(in srgb,var(--accent) 7%,var(--card));min-height:36px}
.maplink:active{filter:brightness(.96)}

/* ============ GENERIC ROWS / GRID ============ */
.eat-row{display:grid;grid-template-columns:auto 1fr;gap:10px 12px;padding:11px 0;border-bottom:1px solid var(--line)}
.eat-row:last-child{border-bottom:0}
.eat-cat{font-size:13px;white-space:nowrap}
.eat-rec{font-size:14px;font-weight:600;line-height:1.3}
.eat-note{grid-column:2;font-size:12.5px;color:var(--ink-soft);margin-top:-4px;line-height:1.4}
.foodlist{display:flex;flex-direction:column;gap:11px}
.food .fn{font-family:var(--serif);font-size:15px;font-weight:600}
.food .fd{font-size:13px;color:var(--ink-soft);line-height:1.5;margin-top:2px}
.gk{display:grid;gap:11px}
.gk .gk-k{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--brass)}
.gk .gk-v{font-size:13.5px;line-height:1.5;margin-top:3px}

/* ============ DAYS LIST ============ */
.daycard{display:flex;align-items:stretch;gap:0;text-decoration:none;color:inherit;margin-bottom:10px;overflow:hidden}
.daycard .stripe{flex:0 0 6px;background:var(--accent)}
.daycard .dc-in{padding:13px 14px;flex:1;min-width:0}
.daycard .dc-top{display:flex;align-items:center;gap:8px}
.daycard .dnum{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.12em;color:#fff;background:var(--accent);padding:2px 7px;border-radius:6px}
.daycard .ddate{font-family:var(--mono);font-size:11px;color:var(--ink-soft);letter-spacing:.04em}
.daycard .dhead{font-family:var(--serif);font-size:17px;font-weight:600;margin-top:6px;line-height:1.2}
.daycard .dsub{font-size:12.5px;color:var(--ink-soft);margin-top:3px;line-height:1.4}
.daycard .chev{align-self:center;color:var(--accent);font-size:20px;padding-right:12px}
.today-badge{font-family:var(--mono);font-size:9px;letter-spacing:.14em;background:#1d4a2e;color:#cfe6d6;padding:2px 6px;border-radius:5px;text-transform:uppercase}

/* ============ DAY DETAIL ============ */
.detail-bar{position:sticky;top:calc(env(safe-area-inset-top,0px) + 48px);z-index:30;display:flex;align-items:center;gap:10px;margin:-16px -14px 10px;padding:10px 14px;background:color-mix(in srgb,var(--paper) 86%,transparent);backdrop-filter:saturate(1.4) blur(8px);-webkit-backdrop-filter:saturate(1.4) blur(8px);border-bottom:1px solid var(--line)}
.backbtn{display:inline-flex;align-items:center;gap:6px;background:none;border:0;color:var(--accent);font-weight:700;font-size:14px;cursor:pointer;min-height:36px}
.detail-bar .dstep{margin-left:auto;display:flex;gap:6px}
.detail-bar .dstep button{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:var(--card);color:var(--accent);font-size:16px;cursor:pointer}
.detail-bar .dstep button:disabled{opacity:.35}

/* ============ NOTES ============ */
textarea.notes{width:100%;min-height:88px;border:1px dashed color-mix(in srgb,var(--accent) 45%,var(--line));border-radius:12px;background:repeating-linear-gradient(var(--card),var(--card) 27px,var(--line) 27px,var(--line) 28px);padding:8px 12px;font-family:var(--sans);font-size:14px;line-height:28px;color:var(--ink);resize:vertical}
textarea.notes:focus{outline:2px solid var(--accent);outline-offset:1px}

/* ============ CHECKLIST ============ */
.progress{height:7px;border-radius:6px;background:var(--paper-2);overflow:hidden;border:1px solid var(--line)}
.progress > i{display:block;height:100%;background:var(--accent);transition:width .3s ease}
.check{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line);cursor:pointer;min-height:var(--tap)}
.check:last-child{border-bottom:0}
.check .box{flex:0 0 22px;height:22px;border-radius:6px;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;transition:background .12s}
.check.on .box{background:var(--accent)}
.check.on .lbl{color:var(--ink-soft);text-decoration:line-through;text-decoration-color:color-mix(in srgb,var(--accent) 60%,transparent)}
.check .lbl{font-size:14.5px;line-height:1.35}

/* ============ ACCORDION (cities/info) ============ */
.acc{border:1px solid var(--line);border-radius:var(--radius);background:var(--card);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)}
.acc > summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:11px;padding:15px 15px;min-height:var(--tap)}
.acc > summary::-webkit-details-marker{display:none}
.acc .city-flag{font-size:20px}
.acc .city-name{font-family:var(--serif);font-size:17px;font-weight:600}
.acc .city-meta{font-size:11.5px;color:var(--ink-soft);margin-top:1px}
.acc .mk{margin-left:auto;color:var(--accent);transition:transform .2s;font-size:14px}
.acc[open] .mk{transform:rotate(90deg)}
.acc .acc-body{padding:2px 15px 16px}
.linkchips{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 12px}
.chip{display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-size:12.5px;font-weight:600;color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,var(--card));border:1px solid color-mix(in srgb,var(--accent) 35%,var(--line));border-radius:999px;padding:7px 12px;min-height:36px}
.chip.flat{color:var(--ink-soft);background:var(--paper-2);border-color:var(--line)}
.minihead{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--brass);margin:12px 0 7px}
.linkrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);text-decoration:none;color:inherit}
.linkrow:last-child{border-bottom:0}
.linkrow .lr-name{font-size:14px;font-weight:600;line-height:1.25}
.linkrow .lr-note{font-size:12px;color:var(--ink-soft)}
.linkrow .lr-go{margin-left:auto;color:var(--accent);font-size:12px;font-weight:700;white-space:nowrap}

/* ============ INFO TABLES ============ */
.kv{display:grid;grid-template-columns:120px 1fr;gap:8px 12px;font-size:13.5px;line-height:1.5}
.kv .k{font-weight:600;color:var(--ink)}
.dtable{width:100%;border-collapse:collapse;font-size:13px}
.dtable th{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--brass);text-align:left;padding:7px 8px;border-bottom:2px solid var(--line)}
.dtable td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:top;line-height:1.4}
.tel{color:var(--accent);font-weight:600;text-decoration:none;white-space:nowrap}
.emerg-call{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 14px;border-bottom:1px solid var(--line)}
.emerg-call:last-child{border-bottom:0}
.emerg-call .ec-c{font-family:var(--serif);font-size:15px;font-weight:600}
.emerg-call .ec-n{font-size:11.5px;color:var(--ink-soft);margin-top:2px}
.callbtn{display:inline-flex;align-items:center;gap:7px;background:#b3261e;color:#fff;border-radius:10px;padding:9px 14px;font-weight:700;font-size:14px;text-decoration:none;min-height:40px}

/* ============ BOTTOM TABBAR ============ */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  background:linear-gradient(180deg,var(--night-2),var(--night));
  border-top:1px solid rgba(201,154,74,.3);
  padding:7px 6px calc(7px + var(--safe-b));
  display:grid;grid-template-columns:repeat(5,1fr);
}
.tab{background:none;border:0;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 2px;color:#9fb0b3;border-radius:10px}
.tab .ti{width:23px;height:23px;display:block}
.tab .tl{font-size:10px;font-weight:600;letter-spacing:.02em}
.tab.active{color:var(--brass-bright)}
.tab.active .ti{filter:drop-shadow(0 0 6px color-mix(in srgb,var(--brass-bright) 50%,transparent))}
.tab svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}

/* ============ MISC ============ */
.note-soft{font-size:12px;color:var(--ink-soft);line-height:1.5}
.divider{height:1px;background:var(--line);margin:14px 0}
.flagrow{font-size:15px;letter-spacing:.18em}
.pricetag{font-family:var(--mono);font-size:12px;color:var(--brass);font-weight:700}
.hidden{display:none!important}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
@media (min-width:560px){ .board h1{font-size:30px} }
.seentog{display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-size:12px;font-weight:600;padding:6px 11px;border-radius:999px;border:1px solid var(--line);background:var(--paper-2);color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent}
.seentog .sbox{display:inline-grid;place-items:center;width:15px;height:15px;border-radius:50%;border:1.5px solid var(--line);font-size:10px;line-height:1;color:transparent}
.seentog.on{background:var(--accent);border-color:var(--accent);color:#fff}
.seentog.on .sbox{border-color:#fff;color:var(--accent);background:#fff}
.stop.seen{background:color-mix(in srgb,var(--accent) 6%,transparent)}
.leg{display:flex;gap:13px;padding:12px 14px;border-bottom:1px solid var(--line);background:color-mix(in srgb,var(--accent) 4%,transparent)}
.leg-ic{flex:0 0 28px;height:28px;border-radius:50%;background:var(--paper-2);border:1px dashed color-mix(in srgb,var(--accent) 55%,var(--line));display:flex;align-items:center;justify-content:center;font-size:13px;margin-top:1px}
.leg-name{font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);font-weight:700}
.leg-desc{font-size:13px;line-height:1.55;color:var(--ink);margin-top:4px}
.seg{display:flex;gap:6px;background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:14px}
.seg button{flex:1;font-family:inherit;font-size:13px;font-weight:600;padding:9px 6px;border:none;border-radius:9px;background:transparent;color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent}
.seg button.on{background:var(--accent);color:#fff}
.tier-head{font-family:var(--mono);font-size:12px;letter-spacing:.03em;color:var(--accent);font-weight:700;margin:16px 0 6px}
.check .mk{margin-left:auto;transition:transform .18s}
.check.open .mk{transform:rotate(90deg)}
.buydetails{display:none;padding:0 14px 12px 50px;font-size:13px;color:var(--muted);line-height:1.5}
.check.open + .buydetails{display:block}
.buydetails .pricetag{font-size:12px}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="mono">BE · LU · FR · CH</span>
    <span class="ttl">A Summer Grand Tour</span>
  </div>
  <div class="leg-pill" id="legPill"><span class="dot"></span><span class="flag" id="legFlag">✈</span><span id="legName">In transit</span></div>
</header>

<main id="app"><!-- views render here --></main>

<nav class="tabbar" id="tabbar"></nav>

<script>
/* ====================== DATA ====================== */
const DATA = {"meta": {"title": "Belgium · Luxembourg · Alsace · Switzerland", "subtitle": "A Summer Grand Tour", "dates": "July 10–21, 2026", "tripStart": "2026-07-10", "tripEnd": "2026-07-21"}, "glance": {"route": [{"nights": "Jul 11–14 (3)", "city": "Brussels", "hotel": "Brussels Marriott Hotel Grand Place", "country": "Belgium 🇧🇪"}, {"nights": "Jul 14–17 (3)", "city": "Luxembourg City", "hotel": "Luxembourg Marriott Hotel Alfa", "country": "Luxembourg 🇱🇺"}, {"nights": "Jul 17–19 (2)", "city": "Strasbourg", "hotel": "Maison Rouge, Autograph Collection", "country": "France (Alsace) 🇫🇷"}, {"nights": "Jul 19–21 (2)", "city": "Zurich", "hotel": "Zurich Marriott Hotel", "country": "Switzerland 🇨🇭"}], "flights": [{"k": "✈  Outbound", "v": "Departs Fri, Jul 10 — Columbus (CMH) → Brussels (BRU), overnight (Air Canada, via Toronto)"}, {"k": "🛬  Lands", "v": "Sat, Jul 11 — Flight AC 826, 7:50 AM (Brussels time)"}, {"k": "🚐  Airport transfer", "v": "Uber Reserve confirmed — Van, €73.10, BRU → Brussels Marriott (see Day 2)"}, {"k": "✈  Return", "v": "Tue, Jul 21 — Zurich (ZRH) → Columbus (CMH)"}], "key": ["Tue Jul 14 — Private driver: Brussels → Durbuy → Dinant → Luxembourg (€750 cash).", "Fri Jul 17 — Private driver: Luxembourg → Haut‑Kœnigsbourg → Colmar → Strasbourg (€800 + €100 deposit).", "Sat Jul 19 — Private driver: Strasbourg → Zurich (€600 card + €100 deposit)."]}, "hotels": [{"name": "Brussels Marriott Hotel Grand Place", "address": "Rue Auguste Orts 3–7, 1000 Brussels, Belgium", "mapUrl": "https://www.google.com/maps/search/?api=1&query=Brussels%20Marriott%20Hotel%20Grand%20Place%2C%20Rue%20Auguste%20Orts%2C%20Brussels", "phone": "+32 2 516 90 90", "notes": "Opposite La Bourse, ~3 blocks from the Grand‑Place, ~10 min walk to Brussels Central station."}, {"name": "Luxembourg Marriott Hotel Alfa", "address": "16 Place de la Gare, 1616 Luxembourg", "mapUrl": "https://www.google.com/maps/search/?api=1&query=Luxembourg%20Marriott%20Hotel%20Alfa%2C%20Place%20de%20la%20G C%20Belgium", "desc": "Dramatic riverside town under a cliff‑top citadel, birthplace of Adolphe Sax (the saxophone). Photograph the Collegiate Church of Notre‑Dame against the rock; grab a couque de Dinant biscuit (~1.5 hrs)."}]}, {"title": "🚗  Private Driver — Day 2: To Strasbourg", "when": "Friday, July 17 — Luxembourg → Haut‑Kœnigsbourg → Colmar → Strasbourg", "detail": {"Pickup": "Luxembourg Marriott Hotel Alfa", "Drop‑off": "Maison Rouge Strasbourg Hotel & Spa", "Route time": "~6–7 hrs incl. two stops", "Payment": "€800 + €100 deposit", "Departure": "10:00 AM (be in the lobby by 9:45)"}, "stops": [{"name": "Château du Haut‑Kœnigsbourg", "url": "https://www.google.com/maps/search/?api=1&query=Chateau%20du%20Haut-Koenigsbourg%2C%20Orschwiller%2C%20France", "desc": "A vast restored medieval fortress perched at 757 m with sweeping views over the Alsace plain and Vosges. Buy tickets on arrival; allow ~1.5 hrs for the ramparts, keep and drawbridge. Cooler at altitude — bring a layer."}, {"name": "Colmar", "url": "https://www.google.com/maps/search/?api=1&query=Colmar%20old%20town%2C%20France", "desc": "The fairy‑tale capital of Alsatian charm: half‑timbered houses, flower‑lined canals of “La Petite Venise,” and the Unterlinden Museum. ~2.5 hrs to wander, lunch and shop before the short hop to Strasbourg."}]}, {"title": "🚗  Private Driver — Day 3: To Zurich", "when": "Saturday, July 19 — Strasbourg → Zurich", "detail": {"Pickup": "Maison Rouge Strasbourg Hotel", "Drop‑off": "Zurich Marriott Hotel", "Route time": "~2–2.5 hrs direct", "Payment": "€600 by credit card + €100 deposit", "Departure": "10:00 AM (be in the lobby by 9:45)"}, "stops": []}], "days": [{"n": 1, "weekday": "Friday", "date": "July 10", "iso": "2026-07-10", "short": "Fri, Jul 10", "headline": "Travel Day — Columbus → Brussels", "subtitle": "Overnight transatlantic · Air Canada (via Toronto YYZ)", "overview": "Final packing and the home checklist, then an afternoon departure and an overnight hop across the Atlantic. Sleep on the plane if you can — you land into a full Brussels morning.", "weather": "In transit", "walking": "Minimal — airport terminals", "transport": "CMH → (YYZ) → BRU, overnight", "schedule": [{"time": "Morning", "plan": "Final packing / home departure checklist"}, {"time": "11:00", "plan": "Leave for the airport"}, {"time": "~2 hrs before", "plan": "Arrive CMH — check bags, security"}, {"time": "Afternoon/Eve", "plan": "Depart Columbus, connect in Toronto (YYZ)"}, {"time": "Overnight", "plan": "Transatlantic flight to Brussels (try to sleep)"}], "tour": null, "callouts": [], "eat": [{"cat": "Pre‑flight", "rec": "Airport dinner at CMH", "notes": "Eat before boarding; transatlantic meal service is late"}, {"cat": "Onboard", "rec": "Stay hydrated, skip extra caffeine", "notes": "Helps with the time change"}], "foods": [], "good": {"photo": "—", "coffee": "Airport lounge if you have access", "restrooms": "Terminal & onboard", "rainy": "You’re indoors all day — no backup needed", "packing": "In your carry‑on: passports, medications, chargers + battery, a change of clothes, toothbrush, and offline‑downloaded maps + this guide."}}, {"n": 2, "weekday": "Saturday", "date": "July 11", "iso": "2026-07-11", "short": "Sat, Jul 11", "headline": "Brussels — Arrival & Old Town", "subtitle": "Land 7:50 AM · settle in · the Grand‑Place on foot", "overview": "Land mid‑morning, glide into the centre with your pre‑booked van, drop bags, and ease into Brussels with a gentle loop around the Grand‑Place and the covered galleries. Keep it light — you’ll be running on plane sleep.", "weather": "July avg ~22°C / 72°F · occasional showers", "walking": "~4–5 km, flat with cobbles", "transport": "Uber Reserve van BRU → hotel; everything else on foot", "schedule": [{"time": "7:50", "plan": "Flight AC 826 lands at Brussels Airport (BRU)"}, {"time": "8:30", "plan": "Passport control & baggage"}, {"time": "9:00", "plan": "Meet Uber Reserve van → Brussels Marriott"}, {"time": "9:45", "plan": "Drop bags at the hotel, first coffee"}, {"time": "11:00", "plan": "Grand‑Place & Town Hall"}, {"time": "12:30", "plan": "Lunch in the centre"}, {"time": "2:00", "plan": "Galeries Royales Saint‑Hubert"}, {"time": "3:00", "plan": "Manneken Pis & laneways"}, {"time": "4:00", "plan": "Hotel check‑in / rest"}, {"time": "7:00", "plan": "Dinner near the Grand‑Place"}], "tour": {"intro": "A compact first loop — all within ~10 minutes of the hotel. Tap each name for the map.", "stops": [{"name": "Grand‑Place / Grote Markt", "url": "https://www.google.com/maps/search/?api=1&query=Grand-Place%2C%20Brussels", "address": "Gr-Place, 1000 Brussels", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Grand-Place%2C%20Brussels", "desc": "Brussels’ jaw‑dropping central square, ringed by gilded guild houses and the Gothic Town Hall. A UNESCO site and the perfect orientation point — stand in the middle and turn 360°."}, {"name": "Brussels Town Hall (Hôtel de Ville)", "url": "https://www.google.com/maps/search/?api=1&query=Brussels%20Town%20Hall%20Hotel%20de%20Ville%20Grand%20Place", "address": "Gr-Place, 1000 Brussels", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Brussels%20Town%20Hall%20Hotel%20de%20Ville%20Grand%20Place", "desc": "The 15th‑century spire is the tallest thing on the square; its 96 m tower is topped by St. Michael. The asymmetric facade is a beloved local quirk."}, {"name": "Galeries Royales Saint‑Hubert", "url": "https://www.google.com/maps/search/?api=1&query=Galeries%20Royales%20Saint-Hubert%2C%20Brussels", "address": "Galerie du Roi 5, 1000 Brussels", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Galeries%20Royales%20Saint-Hubert%2C%20Brussels", "desc": "One of Europe’s oldest glass‑roofed shopping arcades (1847). Chocolatiers, cafes and boutiques under a soaring vault — a perfect rainy‑day stroll and dessert stop (Neuhaus is here)."}, {"name": "St. Michael & St. Gudula Cathedral", "url": "https://www.google.com/maps/search/?api=1&query=Cathedral%20of%20St.%20Michael%20and%20St.%20Gudula%2C%20Brussels", "address": "Place Sainte‑Gudule, 1000 Brussels", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Cathedral%20of%20St.%20Michael%20and%20St.%20Gudula%2C%20Brussels", "desc": "Twin‑towered Gothic cathedral with luminous 16th‑century stained glass. Calm, cool and free to enter — a few minutes uphill from the galleries."}, {"name": "Manneken Pis", "url": "https://www.google.com/maps/search/?api=1&query=Manneken%20Pis%2C%20Brussels", "address": "Rue de l’Étuve 31, 1000 Brussels", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Manneken%20Pis%2C%20Brussels", "desc": "The cheeky little fountain‑boy, smaller than you expect and often dressed in a themed costume. Worth a quick photo en route to the chocolate shops on Rue au Beurre."}, {"name": "Mont des Arts viewpoint", "url": "https://www.google.com/maps/search/?api=1&query=Mont%20des%20Arts%2C%20Brussels", "address": "Mont des Arts, 1000 Brussels", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Mont%20des%20Arts%2C%20Brussels", "desc": "A formal garden on a terrace with the best free skyline view over the lower town toward the Town Hall spire — lovely in late‑afternoon light."}, {"name": "Longchamp (optional — shopping)", "url": "https://www.google.com/maps/search/?api=1&query=Longchamp%20Galerie%20du%20Roi%20Galeries%20Royales%20Saint-Hubert%20Brussels", "address": "Galerie du Roi, Galeries Royales Saint-Hubert, 1000 Brussels", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Longchamp%20Galerie%20du%20Roi%20Galeries%20Royales%20Saint-Hubert%20Brussels", "desc": "Inside the Galeries Royales Saint-Hubert (already on this loop) — usually one of Belgium's best selections of Le Pliage colours and seasonal collections. Ask if they have any colours NOT distributed in North America. There's also a Longchamp on Avenue Louise, but if you only do one, this Galerie du Roi location is the pick. Tip: if you're torn between buying here or in Strasbourg, Strasbourg tends to win on price — so hold off unless a colour here grabs you."}]}, "callouts": [{"title": "Uber Reserve · Brussels Airport (BRU) → Brussels Marriott", "body": "Flight AC 826 tracked — lands 7:50 AM (Brussels time), marked On Time. Vehicle: Van · Fare: €73.10 · Meet at the rideshare pickup point after baggage claim. The driver tracks your flight, so a slightly late landing is fine. Have the Uber app open with data/Wi‑Fi on arrival."}], "eat": [{"cat": "☕ Coffee", "rec": "OR Coffee Brewery (Rue Auguste Orts 9)", "notes": "Excellent roaster, steps from the hotel"}, {"cat": "🍽 Lunch", "rec": "Nüetnigenough (Rue du Lombard 25)", "notes": "Cozy gastro‑pub; carbonnade & local beer — budget–mid"}, {"cat": "🍦 Dessert", "rec": "Maison Dandoy (Rue Charles Buls 14)", "notes": "Brussels & Liège waffles, speculoos — the classic"}, {"cat": "🍽 Dinner", "rec": "Chez Léon or Aux Armes de Bruxelles (Rue des Bouchers)", "notes": "Moules‑frites institutions — touristy but fun"}, {"cat": "🍻 Beer", "rec": "Delirium Café (Impasse de la Fidélité 4)", "notes": "Hundreds of Belgian beers; book nothing, just go"}], "foods": [{"name": "Belgian waffles", "desc": "Light, sugar‑dusted Brussels waffles vs. dense, caramelized Liège waffles — try both."}, {"name": "Frites", "desc": "Twice‑fried and crisp, in a cone with mayo — the national snack, best from a frituur."}, {"name": "Moules‑frites", "desc": "Mussels steamed in white wine with fries — the summer classic."}, {"name": "Belgian pralines", "desc": "Filled chocolates, invented here; buy fresh from a small chocolatier."}, {"name": "Trappist beer", "desc": "Strong abbey ales (Westmalle, Chimay, Orval) — sip one at Delirium."}], "good": {"photo": "Grand‑Place from the corner by Rue au Beurre; the Galeries arcade; Mont des Arts terrace", "coffee": "OR Coffee Brewery; MOK (Rue Antoine Dansaert 196)", "restrooms": "Paid public toilets ~€0.50–1 (bring coins); free in cafes/department stores", "rainy": "Galeries Royales (covered), MIM musical‑instruments museum, Belgian Comic Strip Center", "packing": "Broken‑in walking shoes for cobblestones; a light rain layer."}}, {"n": 3, "weekday": "Sunday", "date": "July 12", "iso": "2026-07-12", "short": "Sun, Jul 12", "headline": "Day Trip — Bruges", "subtitle": "Train from Brussels · canals, chocolate & a brewery", "overview": "An easy hour by train delivers you into the best‑preserved medieval city in Belgium — a postcard of canals, gabled houses and chocolate windows. Start early to beat the day‑trippers to the canal boats.", "weather": "July avg ~21°C / 70°F · breezy on the water", "walking": "~6–7 km on cobbles", "transport": "IC train Brussels‑Central → Brugge main station (~1 hr, ~2/hr)", "schedule": [{"time": "8:00", "plan": "Walk to Brussels‑Central (~10 min from hotel)"}, {"time": "~8:25", "plan": "Train to Brugge — book to “Brugge”, the main station (next IC dir. Blankenberge/Knokke/Oostende, ~1 hr)"}, {"time": "~9:30", "plan": "Arrive Brugge; walk in through Minnewater Park"}, {"time": "9:45", "plan": "Minnewater (Lake of Love) & the Beguinage"}, {"time": "10:15", "plan": "Reach the canal docks near Rozenhoedkaai"}, {"time": "10:30", "plan": "Canal cruise (go early — shortest queue)"}, {"time": "11:15", "plan": "Rozenhoedkaai → Burg Square → Markt & Belfry"}, {"time": "12:15", "plan": "Church of Our Lady & chocolate stop"}, {"time": "1:00", "plan": "Lunch"}, {"time": "2:30", "plan": "De Halve Maan Brewery tour/tasting"}, {"time": "4:00", "plan": "Shopping on Steenstraat & Katelijnestraat (plus the optional Dijver/Vismarkt markets)"}, {"time": "5:45", "plan": "Train back to Brussels"}, {"time": "7:00", "plan": "Dinner in Brussels"}], "tour": {"intro": "Follow this exact order from the station — it takes you through Minnewater Park into the medieval centre, reaching the canal docks for a 10:00 cruise before the crowds. All flat and easy.", "stops": [{"name": "Brugge Railway Station", "url": "https://www.google.com/maps/search/?api=1&query=Brugge%20railway%20station%2C%20Stationsplein%2C%20Bruges", "address": "Stationsplein, 8000 Brugge", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Brugge%20railway%20station%2C%20Stationsplein%2C%20Bruges", "desc": "This is Brugge’s MAIN station (select “Brugge” when booking — not Brugge‑Sint‑Pieters). From the exit it’s a flat, safe ~20 min walk to the Markt, ~10–12 min to Minnewater, and ~15 min to the first canal docks. Trains from Brussels‑Central take ~1 hr, ~2/hr, no seat reservation."}, {"name": "Minnewater Park (Lake of Love)", "url": "https://www.google.com/maps/search/?api=1&query=Minnewater%20Bruges", "address": "Minnewater, 8000 Brugge", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Minnewater%20Bruges", "desc": "Walk straight into the park from the station — a swan‑dotted lake and the loveliest possible introduction to Bruges, quiet and golden in the morning."}, {"name": "Beguinage (Begijnhof)", "url": "https://www.google.com/maps/search/?api=1&query=Begijnhof%20Bruges", "address": "Begijnhof 24–30, 8000 Brugge", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Begijnhof%20Bruges", "desc": "Just past the lake: a serene 13th‑century walled courtyard of white houses around a green, once home to lay religious women. Hushed and beautiful — continue through toward the canals."}, {"name": "Canal Boat Docks (near Rozenhoedkaai)", "url": "https://www.google.com/maps/search/?api=1&query=Rozenhoedkaai%20boat%20dock%20Bruges", "address": "Near Rozenhoedkaai / Dijver, 8000 Brugge", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Rozenhoedkaai%20boat%20dock%20Bruges", "desc": "Aim for the 10:00 cruise. All five operators run the same 30‑min route for €15/adult, so the best boat is simply the one with the shortest line — the docks cluster around Rozenhoedkaai and the Dijver. No advance booking; pay on the spot, cash for tips."}, {"name": "Rozenhoedkaai", "url": "https://www.google.com/maps/search/?api=1&query=Rozenhoedkaai%2C%20Bruges", "address": "Rozenhoedkaai, 8000 Brugge", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Rozenhoedkaai%2C%20Bruges", "desc": "The single most photographed corner in Bruges — the belfry mirrored in the canal. Best light first thing in the morning."}, {"name": "Burg Square", "url": "https://www.google.com/maps/search/?api=1&query=Burg%2C%20Bruges", "address": "Burg, 8000 Brugge", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Burg%2C%20Bruges", "desc": "One of Bruges' two central plazas — the medieval seat of power, fronted by the ornate Gothic City Hall (Stadhuis). A short hop up from Rozenhoedkaai and the start of the old-town core."}, {"name": "Basilica of the Holy Blood (Heilig-Bloedbasiliek)", "url": "https://www.google.com/maps/search/?api=1&query=Basilica%20of%20the%20Holy%20Blood%2C%20Burg%2C%20Bruges", "address": "Burg 13, 8000 Brugge", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Basilica%20of%20the%20Holy%20Blood%2C%20Burg%2C%20Bruges", "desc": "Tucked into the corner of Burg Square: a 12th-century church in two levels — a plain Romanesque lower chapel and an ornate upper chapel said to hold a relic of Christ's blood. Small, free to enter, quick to see."}, {"name": "Markt & Burg Squares (wander)", "url": "https://www.google.com/maps/search/?api=1&query=Markt%2C%20Bruges", "address": "Markt, 8000 Brugge", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Markt%2C%20Bruges", "desc": "Bruges' grand main square, ringed by step-gabled guild houses and lively cafés — the heart of the old town. Pair it with neighbouring Burg Square for the full sweep of historic architecture and street life."}, {"name": "Climb the Belfry of Bruges (Belfort)", "url": "https://www.google.com/maps/search/?api=1&query=Belfry%20of%20Bruges%2C%20Markt%2C%20Bruges", "address": "Markt 7, 8000 Brugge", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Belfry%20of%20Bruges%2C%20Markt%2C%20Bruges", "desc": "The iconic 83 m medieval bell tower over the Markt with panoramic views over the old town and canals — a must-do for first-timers. Climb all 366 narrow steps if legs allow; timed tickets help skip the queue."}, {"name": "Church of Our Lady (Onze‑Lieve‑Vrouwekerk)", "url": "https://www.google.com/maps/search/?api=1&query=Church%20of%20Our%20Lady%20Bruges%20Mariastraat", "address": "Mariastraat, 8000 Brugge", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Church%20of%20Our%20Lady%20Bruges%20Mariastraat", "desc": "Its 115 m brick spire is among the tallest in the world; inside is Michelangelo’s “Madonna and Child,” the only sculpture of his to leave Italy in his lifetime. A few minutes south of the Markt toward the chocolate shops."}, {"name": "Gruuthusemuseum", "url": "https://www.google.com/maps/search/?api=1&query=Gruuthusemuseum%20Bruges", "address": "Dijver 17C, 8000 Brugge", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Gruuthusemuseum%20Dijver%20Bruges", "desc": "A grand 15th-century city palace built by the Lords of Gruuthuse, one of Bruges' richest families. Their fortune came from a monopoly on 'gruut' — the herb-and-spice mix used to flavour and preserve beer before hops took over — which let them tax nearly every brew in the city. The most famous lord, Louis of Gruuthuse, was a knight, book collector and diplomat who sheltered the exiled English king Edward IV here in 1471. Look for the family's private wooden prayer-gallery that connects straight into the Church of Our Lady next door, so they could hear Mass without stepping outside. Reopened in 2019 as a museum of Bruges' decorative arts — tapestries, lace, silver and furniture."}, {"name": "Boniface Bridge (Bonifaciusbrug)", "url": "https://www.google.com/maps/search/?api=1&query=Bonifacius%20Bridge%20Bruges", "address": "Bonifaciusbrug (by the Arentshof), 8000 Brugge", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Bonifacius%20Bridge%20Bruges", "desc": "A tiny, ivy-framed footbridge tucked behind the Church of Our Lady beside the Gruuthuse palace and the Arentshof garden — one of the most photographed corners of Bruges. The twist: despite looking centuries old, it's actually one of the city's youngest bridges, built only around 1910. Nearby stands a bust of Juan Luis Vives, the 16th-century Spanish humanist scholar who made Bruges his home. A quiet, crowd-free photo stop."}, {"name": "St. John's Hospital (Sint-Janshospitaal)", "url": "https://www.google.com/maps/search/?api=1&query=Sint-Janshospitaal%20Memling%20Museum%20Bruges", "address": "Mariastraat 38, 8000 Brugge", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Sint-Janshospitaal%20Mariastraat%20Bruges", "desc": "One of the oldest surviving hospital buildings in Europe, founded around 1150 to care for pilgrims, travellers and the sick; nuns and monks nursed patients here for nearly 700 years. Today it holds the Memling Museum, with six masterpieces by the Early-Netherlandish painter Hans Memling — most famously the exquisite Shrine of St. Ursula, painted for this very hospital — plus a preserved old pharmacy. It faces the Church of Our Lady across Mariastraat."}, {"name": "The Chocolate Line", "url": "https://www.google.com/maps/search/?api=1&query=The%20Chocolate%20Line%20Simon%20Stevinplein%20Bruges", "address": "Simon Stevinplein 19, 8000 Brugge", "addressUrl": "https://www.google.com/maps/search/?api=1&query=The%20Chocolate%20Line%20Simon%20Stevinplein%20Bruges", "desc": "Bruges’ most inventive chocolatier (think Earl Grey, or chili). For a classic box, Dumon (Eiermarkt) is another local favorite a few streets away."}, {"name": "De Halve Maan Brewery", "url": "https://www.google.com/maps/search/?api=1&query=De%20Halve%20Maan%20Brewery%20Walplein%2026%20Bruges", "address": "Walplein 26, 8000 Brugge", "addressUrl": "https://www.google.com/maps/search/?api=1&query=De%20Halve%20Maan%20Brewery%20Walplein%2026%20Bruges", "desc": "The last family brewery in the historic centre, home of Brugse Zot. Tours include the rooftop view and a tasting — popular, so book the tour slot ahead online."}, {"name": "Olleke Wizarding Shop (optional — Harry Potter)", "url": "https://www.google.com/maps/search/?api=1&query=Olleke%20Wizarding%20Shop%20Wijngaardstraat%2012%20Bruges", "address": "Wijngaardstraat 12, 8000 Brugge (2nd branch: Groeninge 1)", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Olleke%20Wizarding%20Shop%20Wijngaardstraat%2012%20Bruges", "desc": "Award-winning wizarding shop — Harry Potter, Fantastic Beasts, Lord of the Rings and more, often cheaper than official stores. Two Bruges branches: Wijngaardstraat 12 (open 7 days, right by the Beguinage — easy to catch early on the route) and Groeninge 1 in the centre near the Dijver (closed Tue & Thu). Sunday Jul 12: both open."}, {"name": "The Wandering Wizard (optional — Harry Potter)", "url": "https://www.google.com/maps/search/?api=1&query=The%20Wandering%20Wizard%20Harry%20Potter%20shop%20Bruges", "address": "Old-town centre, Bruges", "addressUrl": "https://www.google.com/maps/search/?api=1&query=The%20Wandering%20Wizard%20Harry%20Potter%20shop%20Bruges", "desc": "A small Harry Potter merchandise store in the heart of the old town — a fun quick browse near the Markt/chocolate shops. Opening hours can vary, so check before making a special trip."}, {"name": "Dijver folklore & antiques market (optional)", "url": "https://www.google.com/maps/search/?api=1&query=Dijver%20antiques%20market%20Bruges", "address": "Dijver, 8000 Brugge (canal-side by the Groeningemuseum)", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Dijver%20Bruges", "desc": "Type: antiques, bric-a-brac & handmade crafts under the trees along the Dijver canal. Runs Sat, Sun & holidays 10am–6pm (mid-Mar to mid-Nov) — your Sunday visit catches it. Impact: essentially zero — right on your route between Rozenhoedkaai and the Church of Our Lady, and the quiet Groenerei canal is a 2-minute step away for crowd-free photos."}, {"name": "Vismarkt craft market (optional)", "url": "https://www.google.com/maps/search/?api=1&query=Vismarkt%20Bruges", "address": "Vismarkt, 8000 Brugge (just off Huidenvettersplein)", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Vismarkt%20Bruges", "desc": "Type: artisanal & handmade crafts in the colonnaded 18th-century fish market. Open daily (roughly 9:30am–5pm). Impact: minimal — about a 2-minute step off Rozenhoedkaai, easy to fold into the walk."}]}, "callouts": [{"title": "🚶  Recommended arrival route (flat & scenic)", "body": "1. Exit Brugge Station (the main station — not Sint‑Pieters). 2. Walk through Minnewater Park (Lake of Love). 3. Continue past the Beguinage. 4. Arrive at the canal boat docks near Rozenhoedkaai. 5. Take the 10:00 AM canal cruise. 6. Continue to Burg Square and the Markt afterward. Distances from the station: Markt ~20 min · Minnewater ~10–12 min · first canal docks ~15 min."}, {"title": "📲  Before you go", "body": "Download the Google Maps offline area for Bruges so you can navigate the route without using mobile data."}], "eat": [{"cat": "☕ Coffee", "rec": "Li O Lait or Servaas Van Mullem", "notes": "Near the centre; good pastries"}, {"cat": "🍽 Lunch", "rec": "That’s Toast / Books & Brunch / De Stove", "notes": "Budget brunch to mid‑range bistro"}, {"cat": "🍟 Quick bite", "rec": "Fries on the Markt (frituur)", "notes": "Order them ‘met mayo’"}, {"cat": "🍻 Beer", "rec": "De Halve Maan — Brugse Zot", "notes": "Tasting included with the tour"}, {"cat": "🍽 Dinner (Brussels)", "rec": "Back in Brussels ~7:00", "notes": "See Brussels dining"}], "foods": [{"name": "Brugse Zot", "desc": "Bruges’ own golden ale, brewed at De Halve Maan — a tasting comes with the tour."}, {"name": "Bruges chocolate", "desc": "The city is chocolate‑mad; The Chocolate Line and Dumon are local favorites."}, {"name": "Carbonnade flamande", "desc": "Beef braised slowly in dark Belgian beer — the classic Flemish stew."}, {"name": "Speculoos", "desc": "Crisp, spiced caramel biscuits — the cookie with your coffee, and a spread."}], "good": {"photo": "Rozenhoedkaai; Bonifacius Bridge by Our Lady; the Markt from the belfry", "coffee": "Li O Lait; Servaas Van Mullem (great cakes)", "restrooms": "Paid (~€0.50) at the station, Markt area and museums; free with a cafe stop", "rainy": "Groeningemuseum (Flemish Primitives), Historium, Choco‑Story chocolate museum", "packing": "Light jacket — the open canal boats get windy even in July."}}, {"n": 4, "weekday": "Monday", "date": "July 13", "iso": "2026-07-13", "short": "Mon, Jul 13", "headline": "Ghent + optional Coast", "subtitle": "Castle, canals & the Van Eyck altarpiece — with Ostend & De Haan if you're up for it", "overview": "With the evening tour cancelled, Ghent is today's anchor — the moated castle, the Van Eyck altarpiece and a canal cruise past the medieval waterfront — and the North Sea coast (Ostend + Belle Époque De Haan) is an optional afternoon add-on if the group's up for it. It's all on one rail line, so the coast is an easy westward extension, and the evening is free.", "weather": "Ghent ~22°C / low-70s°F · coast a touch cooler & breezier", "walking": "~4 km in Ghent (＋ more if you add the coast)", "transport": "IC train Brussels ⇄ Ghent (~35 min); optional Ghent → Ostend (~45 min) + Kusttram", "schedule": [{"time": "9:00", "plan": "Train Brussels‑Central → Gent‑Sint‑Pieters (~35 min)"}, {"time": "9:45", "plan": "Tram 1 or a short walk into the old centre"}, {"time": "10:00", "plan": "Gravensteen castle & the old town"}, {"time": "11:15", "plan": "St. Bavo's Cathedral & the Ghent Altarpiece"}, {"time": "12:00", "plan": "Ghent canal cruise from the Graslei (~40 min)"}, {"time": "12:45", "plan": "Lunch on the Graslei/Korenlei waterfront"}, {"time": "2:00", "plan": "Optional: train Ghent → Ostend (~45 min) for the coast"}, {"time": "3:00", "plan": "Optional: Ostend promenade + Kusttram to De Haan"}, {"time": "~6:00", "plan": "Train back to Brussels (via Ghent) — or linger for Ghent's golden hour"}, {"time": "Evening", "plan": "Dinner in Ghent or Brussels (evening free — tour cancelled)"}], "tour": {"intro": "Ghent's compact centre and a canal cruise first; the coast stops are optional if you head west in the afternoon. Tap any name for the map.", "stops": [{"name": "Gravensteen (Castle of the Counts), Ghent", "url": "https://www.google.com/maps/search/?api=1&query=Gravensteen%20Sint-Veerleplein%2011%20Ghent", "address": "Sint‑Veerleplein 11, 9000 Gent", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Gravensteen%20Sint-Veerleplein%2011%20Ghent", "desc": "A genuine moated 12th‑century stone fortress in the middle of the city, with a witty audioguide and rooftop rampart views. ~15 min from Gent‑Sint‑Pieters station by Tram 1, or a 20-min walk."}, {"name": "St. Bavo's Cathedral & the Ghent Altarpiece", "url": "https://www.google.com/maps/search/?api=1&query=Saint%20Bavo%27s%20Cathedral%20Ghent%20Sint-Baafsplein", "address": "Sint‑Baafsplein, 9000 Gent", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Saint%20Bavo%27s%20Cathedral%20Ghent%20Sint-Baafsplein", "desc": "Home to the Van Eyck brothers' 1432 'Adoration of the Mystic Lamb' — one of the most influential (and most stolen) paintings in history. Book the timed altarpiece visit with its AR guide."}, {"name": "Ghent Canal Cruise", "url": "https://www.google.com/maps/search/?api=1&query=Ghent%20canal%20boat%20tour%20Graslei", "address": "Graslei / Korenlei quay, 9000 Gent", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Graslei%20Ghent", "desc": "A ~40-minute open-boat cruise along the Leie from the Graslei/Korenlei quays — gliding past the medieval guild houses, under low bridges and around Gravensteen. The loveliest way to see the city, with entertaining guides. Boats leave frequently in summer (~€10); buy at the quayside, no need to pre-book."}, {"name": "Graslei & Korenlei", "url": "https://www.google.com/maps/search/?api=1&query=Graslei%20Ghent", "address": "Graslei, 9000 Gent", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Graslei%20Ghent", "desc": "Ghent's medieval harbour, guild houses lining both banks of the Leie — the city's most beautiful stretch and glorious in late-afternoon golden light. The lunch-and-linger heart of the day; grab a terrace or a cuberdon."}, {"name": "Belfry of Ghent (optional climb)", "url": "https://www.google.com/maps/search/?api=1&query=Belfry%20of%20Ghent%20Sint-Baafsplein", "address": "Sint‑Baafsplein, 9000 Gent", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Belfry%20of%20Ghent%20Sint-Baafsplein", "desc": "A UNESCO‑listed 91 m tower between the two great churches; an elevator goes most of the way up for a panorama over the rooftops."}, {"transit": true, "name": "Optional: Ghent → the coast", "url": "https://www.google.com/maps/search/?api=1&query=Ostend%20railway%20station%20Belgium", "desc": "Up for the sea? Hop an IC train from Gent‑Sint‑Pieters to Ostend (~45 min, ~2/hr, unreserved). At Ostend the Kusttram is across the station forecourt — grab a €7.50 De Lijn day pass to reach De Haan (~20 min east). Heading home, the same line runs Ostend → (Ghent) → Brussels. Prefer to keep it slow? Skip the coast and enjoy Ghent's golden hour on the Graslei instead."}, {"name": "Albert I Promenade & Beach, Ostend (optional)", "url": "https://www.google.com/maps/search/?api=1&query=Albert%20I%20Promenade%20Ostend", "address": "Albert I Promenade, 8400 Oostende", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Albert%20I%20Promenade%20Ostend", "desc": "Ostend's grand seafront walk — rated the best ~90-minute coastal stroll on the line — past the elegant Royal (Venetian) Galleries and the wide North Sea beach. Look for the striking 'Rock Strangers' sculpture."}, {"name": "De Haan (Belle Époque village) (optional)", "url": "https://www.google.com/maps/search/?api=1&query=De%20Haan%20aan%20Zee%20Belgium", "address": "De Haan aan Zee (Kusttram stop), 8420 De Haan", "addressUrl": "https://www.google.com/maps/search/?api=1&query=De%20Haan%20aan%20Zee%20Belgium", "desc": "The one genuinely storybook town on the coast: a preserved Belle Époque resort of turreted villas and leafy lanes (Einstein briefly lived here). A ~20-minute Kusttram ride east of Ostend — the prettiest stop on the line."}, {"name": "De Haan Dyke Promenade (optional)", "url": "https://www.google.com/maps/search/?api=1&query=De%20Haan%20dijk%20promenade%20beach", "address": "Zeedijk, 8420 De Haan", "addressUrl": "https://www.google.com/maps/search/?api=1&query=De%20Haan%20dijk%20promenade%20beach", "desc": "The seafront dyke lined with cafes and ice-cream spots — an easy, breezy walk with the beach on one side and the villas on the other before the train back."}]}, "callouts": [{"title": "☀️ The coast is optional today", "body": "Ghent is the anchor — do it fully first (castle, altarpiece, canal cruise, Graslei). If you've got the energy and the weather's good, the ~45-min train west to Ostend + De Haan is an easy afternoon add. If not, linger in Ghent for golden hour on the Graslei and head back whenever."}, {"title": "🚣 Ghent canal cruise", "body": "The ~40-min open-boat trip from the Graslei/Korenlei quays is the highlight — medieval guild houses from the water, past Gravensteen. Boats run frequently in summer (~€10), buy at the quay, no booking needed. Late morning beats the mid-afternoon queue."}, {"title": "🎟️ Evening is free — tour cancelled", "body": "The Brussels Walking & Tasting Tour (was Mon 5:00 PM) is cancelled, so nothing to rush back for. Trains Ghent → Brussels run every ~10–30 min (~35 min), unreserved — linger for dinner and catch any train home."}], "eat": [{"cat": "🍽 Lunch (Ghent)", "rec": "A Graslei/Korenlei waterfront terrace", "notes": "Waterzooi (creamy Ghent stew) or a relaxed canal-side lunch"}, {"cat": "🍦 Treat", "rec": "Cuberdons from a Groentenmarkt stall", "notes": "Purple cone-shaped 'Ghent noses,' soft & raspberry-sweet"}, {"cat": "🍽 Dinner (Ghent)", "rec": "'t Klokhuis or Mosquito Coast", "notes": "Relaxed, no rush — or head back and eat near the Grand-Place"}, {"cat": "🦐 If you hit the coast", "rec": "Shrimp croquettes; ice cream on the De Haan dyke", "notes": "North Sea garnaal is the classic seaside bite"}], "foods": [{"name": "Gentse waterzooi", "desc": "Ghent's creamy chicken (or fish) stew with vegetables — the city's signature dish."}, {"name": "Cuberdons", "desc": "Purple cone-shaped 'Ghent noses,' soft and raspberry-sweet — from a Groentenmarkt stall."}, {"name": "North Sea grey shrimp", "desc": "If you head to the coast: tiny, sweet 'garnaal,' best as croquettes or in a stuffed tomato."}, {"name": "Belgian frites", "desc": "Grab a cone from a frituur in Ghent or on the coast — always a good idea."}], "good": {"photo": "Graslei from the water; Gravensteen; De Haan's Belle Époque streets (if you add the coast)", "coffee": "A Graslei terrace; Mokabon (Ghent)", "restrooms": "Ghent cathedral, cafes & stations; coast seafront (some paid)", "rainy": "Ghent works in light rain — Gravensteen, St. Bavo's and even the canal boats are fine; save the coast for a clear afternoon.", "packing": "Comfortable shoes for the old town; a light layer if you head to the breezy coast."}}, {"n": 5, "weekday": "Tuesday", "date": "July 14", "iso": "2026-07-14", "short": "Tue, Jul 14", "headline": "Private Driver — Brussels → Luxembourg", "subtitle": "Durbuy & Dinant en route · Ardennes scenery", "overview": "A relaxed transfer day with two storybook stops through the Belgian Ardennes. Bags go straight in the car — no train logistics. (Full driver details are in Confirmed Tours & Private Drivers.)", "weather": "July avg ~22–24°C / 72–75°F", "walking": "Light — strolling each town", "transport": "Private driver (booked), door to door", "schedule": [{"time": "9:45", "plan": "Bags down, lobby of Brussels Marriott"}, {"time": "10:00", "plan": "Private driver pickup"}, {"time": "~11:30", "plan": "Durbuy — “world’s smallest city” (~1.5 hr)"}, {"time": "~2:00", "plan": "Dinant — riverside & citadel (~1.5 hr)"}, {"time": "Evening", "plan": "Arrive Luxembourg Marriott Hotel Alfa"}, {"time": "Dinner", "plan": "Brasserie Alfa (in hotel) or nearby"}, {"time": "Payment", "plan": "€750 cash"}, {"time": "Driver", "plan": "______________  ☎ ____________"}], "tour": {"intro": "Two Ardennes stops with your driver: tiny Durbuy, then riverside Dinant. Tap any name for the map.", "stops": [{"name": "Durbuy Old Town", "url": "https://www.google.com/maps/search/?api=1&query=Durbuy%20old%20town%20Belgium", "address": "Vieille Ville, 6940 Durbuy", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Durbuy%20old%20town%20Belgium", "desc": "Billed as 'the smallest city in the world' — cobbled lanes and 17th-century half-timbered and stone houses you can cross end to end in about five minutes. The streets themselves are the attraction; just wander."}, {"name": "Château de Durbuy", "url": "https://www.google.com/maps/search/?api=1&query=Chateau%20de%20Durbuy%20castle", "address": "Rue du Comte Th. d'Ursel, 6940 Durbuy", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Chateau%20de%20Durbuy%20castle", "desc": "The 11th-century castle over the town — a private residence, so it's admired from outside, but its exterior makes a great photo, especially from across the Ourthe river."}, {"name": "Parc des Topiaires (Topiary Park)", "url": "https://www.google.com/maps/search/?api=1&query=Parc%20des%20Topiaires%20Durbuy", "address": "Rue Haie Himbe 1, 6940 Durbuy", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Parc%20des%20Topiaires%20Durbuy", "desc": "On the riverbank — over 250 topiary sculptures of animals and figures, billed as the largest topiary garden in Europe. About €4.50–5 to enter; a fun 20–30 minutes with castle views."}, {"transit": true, "name": "Durbuy → Dinant (with your driver)", "url": "https://www.google.com/maps/search/?api=1&query=Dinant%20Belgium", "desc": "About an hour's drive south through the rolling Ardennes to Dinant on the Meuse — sit back and enjoy the scenery; no logistics on your end."}, {"name": "Dinant Citadel", "url": "https://www.google.com/maps/search/?api=1&query=Citadelle%20de%20Dinant", "address": "Chemin de la Citadelle 1, 5500 Dinant", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Citadelle%20de%20Dinant", "desc": "The clifftop fortress over the Meuse and the main sight. Ride the cable car up from beside the church, or climb the 408 steps — it costs the same either way. Up top: panoramic river views plus WWI trench and history exhibits. Go first, before it gets busy; ~45 min–1 hr."}, {"name": "Collégiale Notre-Dame de Dinant", "url": "https://www.google.com/maps/search/?api=1&query=Collegiale%20Notre-Dame%20de%20Dinant", "address": "Place Reine Astrid, 5500 Dinant", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Collegiale%20Notre-Dame%20de%20Dinant", "desc": "The riverside church at the base of the cliff, with its distinctive pear-shaped bell tower — free to step inside, right where the cable car starts."}, {"name": "Saxophone Bridge (Pont Charles de Gaulle)", "url": "https://www.google.com/maps/search/?api=1&query=Pont%20Charles%20de%20Gaulle%20Dinant%20saxophone", "address": "Pont Charles de Gaulle, 5500 Dinant", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Pont%20Charles%20de%20Gaulle%20Dinant%20saxophone", "desc": "Dinant is Adolphe Sax's birthplace, so the bridge is lined with giant colourful saxophone sculptures — the classic photo. A statue of Charles de Gaulle nearby marks where he was wounded in WWI."}, {"name": "Maison de Monsieur Sax (optional)", "url": "https://www.google.com/maps/search/?api=1&query=Maison%20de%20Monsieur%20Sax%20Dinant", "address": "37 Rue Adolphe Sax, 5500 Dinant", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Maison%20de%20Monsieur%20Sax%20Dinant", "desc": "A small, free exhibition on the saxophone's inventor, on the pedestrian street named after him — a quick optional look for music fans."}]}, "callouts": [{"title": "🏘️ Durbuy in ~1.5 hr", "body": "Wander the tiny old town (you can cross it in five minutes), photograph the castle from across the river, and walk the Topiary Park — largest in Europe, ~€5. Grab an Ardennes jam or a coffee on the square. Skip the little tourist train (it runs 30–40 min and would eat your window)."}, {"title": "🏰 Dinant in ~1.5 hr", "body": "Cable car up to the citadel (~40 min for the Meuse views and WWI exhibits — same price as the 408 steps), then the church and saxophone bridge below. Buy tickets on the spot and do the citadel first. Prefer not to climb? A relaxed riverside loop (church, saxophones, Sax museum) fills 1.5 hr on its own. Treat: a couque de Dinant."}], "eat": [{"cat": "🍽 Lunch", "rec": "On the square in Durbuy or Dinant", "notes": "Tartines, trout, Ardennes ham"}, {"cat": "🍪 Treat", "rec": "Couque de Dinant", "notes": "Rock‑hard honey biscuit — a local curiosity"}, {"cat": "🍽 Dinner", "rec": "Brasserie Alfa (hotel)", "notes": "French & Luxembourgish; easy after travel"}], "foods": [{"name": "Ardennes ham", "desc": "Air‑dried, smoky cured ham from the Belgian Ardennes — perfect with bread en route."}, {"name": "Couque de Dinant", "desc": "Dinant’s rock‑hard honey biscuit pressed in carved molds — a local curiosity."}, {"name": "Judd mat Gaardebounen", "desc": "Luxembourg’s national dish — smoked pork collar with broad beans; a great arrival dinner."}], "good": {"photo": "Durbuy from the river bridge; Dinant’s church + citadel from the far bank", "coffee": "Cafe on Durbuy’s main square", "restrooms": "Cafes/restaurants at each stop (tip the attendant if asked)", "rainy": "Both stops still work under an umbrella; citadel has indoor sections", "packing": "Keep a small day bag handy; main luggage stays in the car."}}, {"n": 6, "weekday": "Wednesday", "date": "July 15", "iso": "2026-07-15", "short": "Wed, Jul 15", "headline": "Trier — Roman Day Trip", "subtitle": "Germany's oldest city — 'Rome of the North'", "overview": "A full day across the border in Trier, the 'Rome of the North' — a dense cluster of Roman UNESCO monuments: the towering Porta Nigra gate, the Imperial Baths, the amphitheater and Constantine's throne hall, plus one of Germany's great Roman museums. A direct hourly train from Luxembourg City (~50 min) makes it an easy round trip, with a bratwurst and a German beer on the Hauptmarkt in the middle. (Vianden is dropped this time to give the Roman sights a full, unhurried day.)", "weather": "Trier ~24–26°C / high-70s°F · sunny — the better-weather day", "walking": "~6–7 km around a compact, very walkable old town", "transport": "Direct regional train Luxembourg City ⇄ Trier Hbf (~50 min, ~hourly)", "schedule": [{"time": "9:00", "plan": "Train Luxembourg City → Trier Hbf (~50 min)"}, {"time": "10:00", "plan": "Porta Nigra — buy the AntikenCard here for the Roman sites"}, {"time": "10:45", "plan": "Rheinisches Landesmuseum — mosaics, sculpture & the Trier Gold Hoard"}, {"time": "12:00", "plan": "Hauptmarkt: lunch — bratwurst & a German beer"}, {"time": "1:15", "plan": "Trier Cathedral (Dom) & Liebfrauenkirche"}, {"time": "2:00", "plan": "Konstantin-Basilika (Aula Palatina) — Constantine's throne hall"}, {"time": "2:45", "plan": "Amphitheater — the arena & gladiators' cellar (your 2nd Basic-card monument)"}, {"time": "4:00", "plan": "Optional extras: the Imperial or Forum Baths, the Roman Bridge, or free time & Moselle wine on the square"}, {"time": "~6:15", "plan": "Train Trier → Luxembourg City (~50 min)"}, {"time": "Evening", "plan": "Dinner back in Luxembourg"}], "tour": {"intro": "Trier's Roman monuments and museum, all in a compact, walkable old town. Tap any name for the map.", "stops": [{"name": "Porta Nigra", "url": "https://www.google.com/maps/search/?api=1&query=Porta%20Nigra%20Trier", "address": "Porta-Nigra-Platz, 54290 Trier", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Porta%20Nigra%20Trier", "desc": "The colossal blackened Roman city gate (c. 170 AD) — the best-preserved Roman gate north of the Alps and Trier's symbol. Climb inside for the galleries and views. Buy your AntikenCard here as your first stop; the old town runs south from the gate."}, {"name": "Ditsch pretzel stop (optional)", "url": "https://www.google.com/maps/search/?api=1&query=Ditsch%20Brezelbackerei%20Simeonstrasse%2040%20Trier", "address": "Simeonstraße 40, 54290 Trier", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Ditsch%20Brezelbackerei%20Simeonstrasse%2040%20Trier", "desc": "A dedicated pretzel bakery on Simeonstraße — the pedestrian street between the Porta Nigra and the Hauptmarkt, so it's right on your walk. Grab a fresh, warm Brezel to snack on between the Roman sites."}, {"name": "Rheinisches Landesmuseum", "url": "https://www.google.com/maps/search/?api=1&query=Rheinisches%20Landesmuseum%20Trier", "address": "Weimarer Allee 1, 54290 Trier", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Rheinisches%20Landesmuseum%20Trier", "desc": "One of Germany's great Roman archaeology museums — mosaics, sculpture, everyday objects, reconstructed models, and the dazzling Trier Gold Hoard (~11.5 kg, one of Europe's largest Roman gold finds). Turns the ruins into a coherent story. Tue–Sun 10–5; free with the AntikenCard."}, {"name": "Hauptmarkt (Main Market Square)", "url": "https://www.google.com/maps/search/?api=1&query=Hauptmarkt%20Trier", "address": "Hauptmarkt, 54290 Trier", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Hauptmarkt%20Trier", "desc": "Trier's lively medieval heart — St. Peter's Fountain, gabled houses and cafes. The place to break for a bratwurst and a German beer (or a Moselle Riesling) before the afternoon's Roman sites."}, {"name": "Trier Cathedral (Dom) & Liebfrauenkirche", "url": "https://www.google.com/maps/search/?api=1&query=Trier%20Cathedral%20Dom%20St%20Peter", "address": "Liebfrauenstraße 12, 54290 Trier", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Trier%20Cathedral%20Dom%20St%20Peter", "desc": "Germany's oldest cathedral, built around a Roman core, standing beside the early-Gothic Church of Our Lady — both part of the UNESCO ensemble. Free to step inside; the Roman foundations underneath are part of what earned the listing."}, {"name": "Konstantin-Basilika (Aula Palatina)", "url": "https://www.google.com/maps/search/?api=1&query=Konstantin%20Basilika%20Trier", "address": "Konstantinplatz 10, 54290 Trier", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Konstantin%20Basilika%20Trier", "desc": "The vast 4th-century Roman throne hall of Emperor Constantine — an astonishing single brick-walled room, now a church, and one of the largest surviving Roman interiors anywhere. Free to enter."}, {"name": "Amphitheater", "url": "https://www.google.com/maps/search/?api=1&query=Amphitheater%20Trier", "address": "Olewiger Str. 25, 54295 Trier", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Amphitheater%20Trier", "desc": "Built around 100 AD and once seating up to 20,000, this is where gladiators and animal hunts drew the crowds. Descend into the arena and the gladiators' cellar beneath the stage. Free with the AntikenCard."}, {"name": "Roman Bridge (Römerbrücke) (optional)", "url": "https://www.google.com/maps/search/?api=1&query=Romerbrucke%20Roman%20Bridge%20Trier", "address": "Römerbrücke, 54290 Trier", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Romerbrucke%20Roman%20Bridge%20Trier", "desc": "The oldest bridge in Germany — its dark stone piers are Roman (2nd century) and still carry traffic today. Free to walk across; a quick add if you have time before the train."}, {"name": "Karl-Marx-Haus (optional)", "url": "https://www.google.com/maps/search/?api=1&query=Karl%20Marx%20House%20Trier", "address": "Brückenstraße 10, 54290 Trier", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Karl%20Marx%20House%20Trier", "desc": "The Baroque townhouse where Karl Marx was born in 1818, now a museum on his life and legacy — optional, for anyone curious."}, {"name": "Kaiserthermen (Imperial Baths) (optional)", "url": "https://www.google.com/maps/search/?api=1&query=Kaiserthermen%20Trier", "address": "Weberbach 41, 54290 Trier", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Kaiserthermen%20Trier", "desc": "Among the largest bath complexes in the Roman Empire — towering walls and a warren of underground service tunnels you can walk. Not on the Basic AntikenCard (it's a Premium-card monument), so it's a pay-extra or skip on your plan; worth it if you have time and energy left."}, {"name": "Thermen am Viehmarkt (Forum Baths) (optional)", "url": "https://www.google.com/maps/search/?api=1&query=Thermen%20am%20Viehmarkt%20Trier", "address": "Viehmarktplatz, 54290 Trier", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Thermen%20am%20Viehmarkt%20Trier", "desc": "Roman bath ruins from the 1st–4th c. AD, preserved under a modern glass pavilion in the old town. Like the Kaiserthermen, it's a Premium-card monument — not on the Basic card — so treat it as an optional extra."}]}, "callouts": [{"title": "🎟️ AntikenCard — the smart Roman ticket", "body": "A combined ticket bundles the Roman monuments with the Rheinisches Landesmuseum, cheaper than paying per site (~€6 each). Basic ~€12 covers two monuments + the museum; Premium ~€18 covers all four monuments + the museum. On the Basic card, do Porta Nigra + the Amphitheater plus the museum — the two bath complexes (Kaiserthermen, Thermen am Viehmarkt) need the Premium card or a separate ticket, so they're the optional extras. Buy at the Porta Nigra as your first stop. Bonus: through 9 Aug 2026, under-18s get in free."}, {"title": "🚆 Getting there", "body": "Direct trains run Luxembourg City → Trier Hbf about hourly, ~50 min. Bring your passport (Schengen). Luxembourg's free transport stops at the border, so buy a cheap ticket for the German stretch. From Trier Hbf the old town is a ~10-min walk via the Porta Nigra."}, {"title": "🌭 Lunch on the Hauptmarkt", "body": "Break mid-day on the market square for a bratwurst and a German beer (or a Moselle Riesling). For a proper brewpub with a beer garden, Altes Brauhaus is a short walk out in Heiligkreuz."}, {"title": "🏛️ Full day, no rush", "body": "The headline Roman monuments fit comfortably in one full day. Group them by area — Porta Nigra, museum and cathedral in the centre, then the Imperial Baths and amphitheater to the southeast. Two days would let you add the Barbara Baths and Forum Baths, but you won't feel short-changed in one."}], "eat": [{"cat": "🌭 Bratwurst & beer", "rec": "Bitburger Wirtshaus (near the Hauptmarkt)", "notes": "The local-brewery tavern — classic sit-down bratwurst with a German beer on tap"}, {"cat": "🍽 Traditional alternative", "rec": "Zum Domstein, on the Hauptmarkt", "notes": "Old-school German fare on the square (with a Roman-recipe cellar)"}, {"cat": "🥨 Pretzel", "rec": "Ditsch (Brezelbäckerei), Simeonstraße 40", "notes": "Fresh Brezeln on the Porta Nigra–Hauptmarkt street — quick & cheap"}, {"cat": "🍷 If you'd rather wine", "rec": "Moselle Riesling", "notes": "Trier is a Mosel wine capital — crisp local whites everywhere"}], "foods": [{"name": "Bratwurst", "desc": "Grilled German sausage — the thing to order, with mustard and a bun or potatoes."}, {"name": "Moselle Riesling", "desc": "Trier is a Mosel wine capital — light, crisp, aromatic whites if you'd rather a glass than a beer."}, {"name": "Flammkuchen", "desc": "A thin, crispy tart with crème fraîche, onion and bacon — common across this border region."}, {"name": "Brezel (pretzel)", "desc": "A fresh soft pretzel from a Hauptmarkt bakery — the easy Roman-sightseeing snack."}], "good": {"photo": "The Porta Nigra; the amphitheater arena; the Hauptmarkt fountain", "coffee": "A Hauptmarkt terrace", "restrooms": "The museum, monuments, Hauptmarkt and station (some paid)", "rainy": "It's the good-weather day — but the Landesmuseum, cathedral and Constantine Basilica are all indoors if a shower blows through.", "packing": "Passport for Germany, comfortable shoes, water and a hat for the open amphitheater and baths."}}, {"n": 7, "weekday": "Thursday", "date": "July 16", "iso": "2026-07-16", "short": "Thu, Jul 16", "headline": "Luxembourg City", "subtitle": "Casemates, the Corniche & the Grund", "overview": "A dramatic capital built across gorges and ramparts. The old town and fortifications are UNESCO‑listed and walkable, and — wonderfully — all public transport in the country is free, so the funiculars, lifts and buses cost nothing.", "weather": "July avg ~24°C / 75°F", "walking": "~5–6 km with some stairs/hills", "transport": "All free: trams, buses, the Pfaffenthal lift & funicular", "schedule": [{"time": "9:00", "plan": "Place d’Armes & old town"}, {"time": "9:45", "plan": "Grand Ducal Palace & Notre‑Dame"}, {"time": "11:00", "plan": "Bock Casemates"}, {"time": "12:30", "plan": "Chemin de la Corniche viewpoint"}, {"time": "1:00", "plan": "Lunch"}, {"time": "Afternoon", "plan": "Down to the Grund; Pfaffenthal panoramic lift"}, {"time": "Evening", "plan": "Dinner in the old town"}], "tour": {"intro": "A loop around the Ville Haute (upper town) and its balconies over the valley. Free lifts handle the climbs.", "stops": [{"name": "Place d’Armes", "url": "https://www.google.com/maps/search/?api=1&query=Place%20d'Armes%20Luxembourg%20City", "address": "Place d’Armes, 1136 Luxembourg", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Place%20d'Armes%20Luxembourg%20City", "desc": "The lively cafe‑ringed heart of the old town and a good orientation point a short walk from the hotel/station."}, {"name": "Grand Ducal Palace", "url": "https://www.google.com/maps/search/?api=1&query=Grand%20Ducal%20Palace%20Luxembourg", "address": "17 Rue du Marché‑aux‑Herbes, 1728 Luxembourg", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Grand%20Ducal%20Palace%20Luxembourg", "desc": "The town residence of the Grand Duke, with a Flemish‑Renaissance facade and ceremonial guards. Summer guided tours of the interior run — check times."}, {"name": "Notre‑Dame Cathedral", "url": "https://www.google.com/maps/search/?api=1&query=Notre-Dame%20Cathedral%20Luxembourg", "address": "Rue Notre‑Dame, 2240 Luxembourg", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Notre-Dame%20Cathedral%20Luxembourg", "desc": "A graceful 17th‑century church mixing late‑Gothic and Renaissance, with a crypt of the Grand Ducal family guarded by bronze lions."}, {"name": "Place de la Constitution (Gëlle Fra)", "url": "https://www.google.com/maps/search/?api=1&query=Place%20de%20la%20Constitution%20Luxembourg", "address": "Place de la Constitution, 1135 Luxembourg", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Place%20de%20la%20Constitution%20Luxembourg", "desc": "The golden “Gëlle Fra” war‑memorial statue stands on the rampart edge with a sweeping view over the Adolphe Bridge and the Pétrusse valley."}, {"name": "Bock Casemates", "url": "https://www.google.com/maps/search/?api=1&query=Bock%20Casemates%20Luxembourg", "address": "10 Montée de Clausen, 1343 Luxembourg", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Bock%20Casemates%20Luxembourg", "desc": "A honeycomb of cliff tunnels carved into the rock since 1644 — the cradle of the city. Bring a layer; it’s cool and a bit steep inside. Allow ~1 hour."}, {"name": "Chemin de la Corniche", "url": "https://www.google.com/maps/search/?api=1&query=Chemin%20de%20la%20Corniche%20Luxembourg", "address": "Chemin de la Corniche, 1945 Luxembourg", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Chemin%20de%20la%20Corniche%20Luxembourg", "desc": "Called “the most beautiful balcony in Europe” — a rampart promenade looking down on the Grund’s red roofs and the river. The signature Luxembourg view."}, {"name": "The Grund (lower town)", "url": "https://www.google.com/maps/search/?api=1&query=Grund%20Luxembourg", "address": "Grund, 1645 Luxembourg", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Grund%20Luxembourg", "desc": "Descend (walk or take the free Pfaffenthal/Grund lift) into the riverside quarter of old stone houses and pubs along the Alzette — a complete change of scene below the cliffs."}, {"name": "Knídler market, Place Guillaume II (optional)", "url": "https://www.google.com/maps/search/?api=1&query=Place%20Guillaume%20II%20Luxembourg%20City", "address": "Place Guillaume II, Luxembourg City", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Place%20Guillaume%20II%20Luxembourg%20City", "desc": "Type: open-air produce, flowers & local-food market — the twice-weekly 'Knídler'. Runs Wed & Sat mornings — runs Wed & Sat mornings. Impact: none — Place Guillaume II is central, already on your old-town loop by the palace and city hall."}, {"name": "Luxembourg House (optional — local crafts)", "url": "https://www.google.com/maps/search/?api=1&query=Luxembourg%20House%202%20Rue%20de%20l%27Eau%20Luxembourg%20City", "address": "2 Rue de l'Eau, Luxembourg City", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Luxembourg%20House%202%20Rue%20de%20l%27Eau%20Luxembourg%20City", "desc": "A concept store for authentic Luxembourg-made goods — textiles, pottery, design pieces and quality souvenirs — on Rue de l'Eau, right in the old-town core on your loop. The best single stop for locally crafted gifts rather than generic souvenirs."}, {"name": "Rue Philippe II (optional — luxury mile)", "url": "https://www.google.com/maps/search/?api=1&query=Rue%20Philippe%20II%20Luxembourg%20City", "address": "Rue Philippe II, Luxembourg City", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Rue%20Philippe%20II%20Luxembourg%20City", "desc": "Luxembourg's luxury shopping street, a couple of minutes off Place d'Armes/Grand-Rue — fashion, jewellery and high-end boutiques. A quick browse if anyone wants to splurge; central and easy to fold in."}, {"name": "Villeroy & Boch — The House (optional — porcelain)", "url": "https://www.google.com/maps/search/?api=1&query=Villeroy%20Boch%202%20rue%20du%20Fosse%20Luxembourg%20City", "address": "2 rue du Fossé, Luxembourg City", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Villeroy%20Boch%202%20rue%20du%20Fosse%20Luxembourg%20City", "desc": "The famous porcelain maker with deep Luxembourg roots — its first pattern, 'Vieux Luxembourg,' dates to 1745. The central shop at 2 rue du Fossé shows the full collections, open Mon–Sat 10–6, so your Thursday works. Worth a look for a distinctive Luxembourg-made gift."}]}, "callouts": [{"title": "🛍️ Optional — pharmacy & chocolate", "body": "Not a big shopping city, so travel light here. If you want: European pharmacy skincare (Avène, La Roche-Posay, Bioderma, Nuxe, Eucerin) often runs cheaper than in the US, and Luxlait chocolate plus Belgian/Luxembourg brands are easy finds at a Cactus or Auchan supermarket. Save the serious hauls for Strasbourg (beauty) and Zürich (chocolate)."}], "eat": [{"cat": "🍽 Lunch", "rec": "Brasserie Guillaume or Um Dierfgen", "notes": "Judd mat Gaardebounen (smoked pork) — the national dish"}, {"cat": "☕ Coffee/Pastry", "rec": "Oberweis (Grand‑Rue 16)", "notes": "Beloved patisserie — try the pastries"}, {"cat": "🍷 Wine", "rec": "A glass of Moselle Riesling", "notes": "Luxembourg’s crisp white"}, {"cat": "🍽 Dinner (special)", "rec": "Clairefontaine or Mosconi (Grund)", "notes": "Michelin‑level — reserve ahead"}], "foods": [{"name": "Judd mat Gaardebounen", "desc": "Smoked pork collar with b
