road beans in a creamy sauce — the national dish."}, {"name": "Gromperekichelcher", "desc": "Crispy fried potato fritters with onion and parsley — a beloved street snack."}, {"name": "Bouneschlupp", "desc": "Hearty green‑bean soup with potatoes and sausage — simple Luxembourg comfort food."}, {"name": "Moselle Riesling", "desc": "Crisp white wine (and excellent Crémant sparkling) from the nearby Moselle valley."}], "good": {"photo": "Corniche over the Grund; Gëlle Fra with the valley; the palace facade", "coffee": "Oberweis; Konrad Café", "restrooms": "Place d’Armes, museums, casemates entrance", "rainy": "MUDAM modern‑art museum, Luxembourg City History Museum, the casemates", "packing": "A layer for the cool casemate tunnels; shoes with grip for ramp/stairs."}}, {"n": 8, "weekday": "Friday", "date": "July 17", "iso": "2026-07-17", "short": "Fri, Jul 17", "headline": "Private Driver — Luxembourg → Strasbourg", "subtitle": "Haut‑Kœnigsbourg & Colmar en route", "overview": "A spectacular transfer through the Vosges into Alsace: a mountaintop fortress and the fairy‑tale canals of Colmar before checking into your Strasbourg base. (Full details in Confirmed Tours & Private Drivers.)", "weather": "July avg ~26°C / 79°F · cooler at the castle", "walking": "Moderate — castle ramparts; Colmar strolling", "transport": "Private driver (booked), door to door", "schedule": [{"time": "9:45", "plan": "Bags down, lobby of Marriott Alfa"}, {"time": "10:00", "plan": "Private driver pickup"}, {"time": "~11:30", "plan": "Château du Haut‑Kœnigsbourg (~1.5 hr)"}, {"time": "~2:30", "plan": "Colmar — ‘La Petite Venise’ (~2.5 hr)"}, {"time": "Evening", "plan": "Arrive Maison Rouge, Strasbourg"}, {"time": "Dinner", "plan": "Winstub near Place Kléber"}, {"time": "Payment", "plan": "€800 + €100 deposit"}, {"time": "Driver", "plan": "______________  ☎ ____________"}], "tour": {"intro": "A mountaintop fortress, then fairy-tale Colmar — both with your driver. Tap any name for the map.", "stops": [{"name": "Château du Haut-Kœnigsbourg", "url": "https://www.google.com/maps/search/?api=1&query=Chateau%20du%20Haut-Koenigsbourg%20Orschwiller", "address": "67600 Orschwiller, France", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Chateau%20du%20Haut-Koenigsbourg%20Orschwiller", "desc": "A vast medieval fortress at 757 m, ruined for centuries then grandly restored (1900–08) by Kaiser Wilhelm II. Walk the ramparts, keep and drawbridge, and take in the sweeping panorama over the Alsace plain — the Black Forest and even the Alps on a clear day. Allow ~1–1.5 hr; ~€10, buy on arrival. It's cooler up top, so bring a layer."}, {"transit": true, "name": "Haut-Kœnigsbourg → Colmar (with your driver)", "url": "https://www.google.com/maps/search/?api=1&query=Colmar%20old%20town%20France", "desc": "About 30 minutes down from the Vosges foothills into the Alsace plain and Colmar — an easy hop with your driver."}, {"name": "La Petite Venise (Little Venice), Colmar", "url": "https://www.google.com/maps/search/?api=1&query=La%20Petite%20Venise%20Colmar", "address": "Quai de la Poissonnerie, 68000 Colmar", "addressUrl": "https://www.google.com/maps/search/?api=1&query=La%20Petite%20Venise%20Colmar", "desc": "Colmar's postcard corner — candy-coloured half-timbered houses leaning over a canal. Wander the quays, or take a flat-bottomed boat ride for the classic view. Loveliest in late-afternoon light."}, {"name": "Colmar Old Town (Maison Pfister & Koïfhus)", "url": "https://www.google.com/maps/search/?api=1&query=Maison%20Pfister%20Colmar", "address": "11 Rue des Marchands, 68000 Colmar", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Maison%20Pfister%20Colmar", "desc": "The heart of Colmar — the ornate 1537 Maison Pfister, the old Koïfhus customs house, and the fishmongers' Quai de la Poissonnerie, all along cobbled, flower-lined Rue des Marchands. Pure Alsatian storybook."}, {"name": "Marché Couvert (Covered Market)", "url": "https://www.google.com/maps/search/?api=1&query=Marche%20Couvert%20Colmar%20rue%20des%20Ecoles", "address": "13 Rue des Écoles, 68000 Colmar", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Marche%20Couvert%20Colmar%20rue%20des%20Ecoles", "desc": "A beautiful 1865 brick-and-iron market hall of ~20 Alsatian producers — cheese, charcuterie, foie gras, bakery and wine. Open Tue–Sun (closed Mon), so your Friday stop works. A short walk from Petite Venise — a great grazing lunch."}, {"name": "Unterlinden Museum (optional)", "url": "https://www.google.com/maps/search/?api=1&query=Unterlinden%20Museum%20Colmar", "address": "Place Unterlinden, 68000 Colmar", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Unterlinden%20Museum%20Colmar", "desc": "Home to the Isenheim Altarpiece, Grünewald's early-16th-century masterpiece — one of the most powerful paintings in Europe. Optional, for art lovers with time to spare in the ~2.5 hr window."}]}, "callouts": [{"title": "🏰 Haut-Kœnigsbourg in ~1.5 hr", "body": "Walk the ramparts, keep and drawbridge, and soak up the panorama over the Alsace plain — the Black Forest and even the Alps on a clear day. Entry ~€10, buy on arrival. It's cool at 757 m, so bring a layer even in July."}, {"title": "🥨 Colmar in ~2.5 hr", "body": "Wander the old town (Maison Pfister, the Koïfhus, Rue des Marchands), drift through La Petite Venise, browse the covered market, and lunch on a canal terrace with a glass of Alsace Riesling. Art lovers: the Unterlinden Museum's Isenheim Altarpiece is a short detour."}, {"title": "🧾 VAT refund — plan ahead", "body": "This is your last full day in the EU. If you've bought big-ticket items, you can reclaim VAT — but you must get customs export validation when you leave the EU, which happens at the France→Switzerland border tomorrow. Keep receipts + forms together and ready. See Emergency Information."}], "eat": [{"cat": "🍽 Lunch (Colmar)", "rec": "A winstub on the canals", "notes": "Tarte flambée, Alsatian wine"}, {"cat": "🍷 Wine", "rec": "Riesling or Gewürztraminer", "notes": "You’re on the Alsace wine route"}, {"cat": "🍽 Dinner (Strasbourg)", "rec": "Chez Yvonne or Maison Kammerzell", "notes": "Classic winstub fare"}], "foods": [{"name": "Tarte flambée", "desc": "Alsace’s thin, crackly ‘flammekueche’ with crème fraîche, onion and lardons — perfect lunch in Colmar."}, {"name": "Bretzel", "desc": "The soft Alsatian pretzel — a good snack on the road."}, {"name": "Kougelhopf", "desc": "Fluted ring cake with raisins and almonds — sweet, or savory as an aperitif."}, {"name": "Alsace wine", "desc": "Aromatic Riesling and Gewürztraminer from the villages you pass on the wine route."}], "good": {"photo": "Haut‑Kœnigsbourg ramparts; Colmar’s Petite Venise canal", "coffee": "Cafe on a Colmar square", "restrooms": "Castle entrance, Colmar car parks & cafes", "rainy": "Castle interior + Unterlinden Museum in Colmar cover a wet day", "packing": "Layer for the castle; tomorrow you cross into Switzerland."}}, {"n": 9, "weekday": "Saturday", "date": "July 18", "iso": "2026-07-18", "short": "Sat, Jul 18", "headline": "Strasbourg", "subtitle": "Cathedral, Petite France & a Batorama cruise", "overview": "The capital of Alsace is made for walking: a soaring pink cathedral, the canal‑laced Petite France quarter, and a relaxing boat loop that ties it all together. Everything is within a tight, mostly‑pedestrian centre.", "weather": "July avg ~26°C / 79°F", "walking": "~5–6 km, flat", "transport": "All on foot from the hotel; trams if needed", "schedule": [{"time": "9:00", "plan": "Strasbourg Cathedral (early = fewer crowds) & Maison Kammerzell"}, {"time": "10:00", "plan": "Palais Rohan & the Batorama boat cruise (~70 min, departs alongside)"}, {"time": "11:30", "plan": "Stroll west along the Ill to La Petite France"}, {"time": "12:30", "plan": "Ponts Couverts & Barrage Vauban — the furthest point"}, {"time": "1:00", "plan": "Lunch in Petite France — tarte flambée"}, {"time": "2:30", "plan": "Work back east to Place Kléber + the beauty loop (pharmacy, Monoprix, KIKO)"}, {"time": "Evening", "plan": "Dinner in a winstub"}, {"time": "~9:15", "plan": "Golden hour: stroll to the Barrage Vauban terrace & Ponts Couverts for sunset over Petite France (sun sets ~9:25 PM in July)"}], "tour": {"intro": "A clean loop from Maison Rouge: the cathedral quarter first (before the crowds), then west along the Ill to Petite France and the Barrage Vauban — your furthest point — looping back via Place Kléber and the shopping street to finish near the hotel. Tap any name for the map.", "stops": [{"name": "Strasbourg Cathedral (Notre‑Dame)", "url": "https://www.google.com/maps/search/?api=1&query=Strasbourg%20Cathedral", "address": "Place de la Cathédrale, 67000 Strasbourg", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Strasbourg%20Cathedral", "desc": "A masterpiece of Gothic in rose sandstone — for centuries the tallest building in the world. See the astronomical clock (daily show ~12:30) and climb the 332‑step platform for the view. ~5 min from the hotel."}, {"name": "Maison Kammerzell", "url": "https://www.google.com/maps/search/?api=1&query=Maison%20Kammerzell%20Strasbourg", "address": "16 Place de la Cathédrale, 67000 Strasbourg", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Maison%20Kammerzell%20Strasbourg", "desc": "The most ornate medieval house in the city, all carved timber and leaded glass, right on the cathedral square — now a restaurant."}, {"name": "Longchamp ⭐ (optional — top buying pick)", "url": "https://www.google.com/maps/search/?api=1&query=Longchamp%2017%20rue%20du%20Dome%20Strasbourg", "address": "17 rue du Dôme, 67000 Strasbourg (steps from the Cathedral)", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Longchamp%2017%20rue%20du%20Dome%20Strasbourg", "desc": "The #1 buying destination on this trip: French pricing, an excellent chance of seasonal colours, far less crowded than Paris, and staff who tend to know the current collections well. Right by the Cathedral. Note: closed Sundays — so shop on your full Strasbourg day (Sat Jul 18), since you leave Sunday morning."}, {"name": "Palais Rohan", "url": "https://www.google.com/maps/search/?api=1&query=Palais%20Rohan%20Strasbourg", "address": "2 Place du Château, 67000 Strasbourg", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Palais%20Rohan%20Strasbourg", "desc": "An 18th‑century episcopal palace on the river housing three museums (fine arts, decorative arts, archaeology). The Batorama boats depart from the quay just beside it."}, {"name": "Batorama Boat Cruise", "url": "https://www.google.com/maps/search/?api=1&query=Batorama%20Strasbourg%20embarcadere%20Palais%20Rohan", "address": "2 Place du Marché‑aux‑Poissons, 67000 Strasbourg", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Batorama%20Strasbourg%20embarcadere%20Palais%20Rohan", "desc": "A 70‑minute glass‑roofed cruise that loops from the old town through the locks to the modern European quarter — the easiest way to see it all. Book online for a set time or buy at the quay; ~€16."}, {"name": "Saturday Alsatian market — Marché aux Poissons (optional)", "url": "https://www.google.com/maps/search/?api=1&query=Place%20du%20Vieux%20Marche%20aux%20Poissons%20Strasbourg", "address": "Place du Vieux Marché aux Poissons, 67000 Strasbourg (by the Cathedral)", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Place%20du%20Vieux%20Marche%20aux%20Poissons%20Strasbourg", "desc": "Type: Alsatian farm & regional produce market (cheese, charcuterie, foie gras, flowers). Saturday mornings ~7am–1pm — aligns with your Saturday in Strasbourg. Impact: low — steps from the Cathedral, right on your old-town loop. Bonus: a collectibles/flea market also runs Wed & Sat (7am–4pm) nearby around Place de l'Étal."}, {"name": "La Petite France", "url": "https://www.google.com/maps/search/?api=1&query=La%20Petite%20France%20Strasbourg", "address": "Petite France, 67000 Strasbourg", "addressUrl": "https://www.google.com/maps/search/?api=1&query=La%20Petite%20France%20Strasbourg", "desc": "The dreamy old tanners’ quarter — timber houses leaning over canals, flower boxes and water locks. Save it for late afternoon light, then settle in for dinner."}, {"name": "Ponts Couverts & Barrage Vauban", "url": "https://www.google.com/maps/search/?api=1&query=Ponts%20Couverts%20Strasbourg", "address": "Ponts Couverts, 67000 Strasbourg", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Ponts%20Couverts%20Strasbourg", "desc": "Medieval defensive towers and covered bridges; climb to the free panoramic terrace atop the Vauban dam for the postcard view back over Petite France."}, {"name": "Place Kléber", "url": "https://www.google.com/maps/search/?api=1&query=Place%20Kleber%20Strasbourg", "address": "Place Kléber, 67000 Strasbourg", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Place%20Kleber%20Strasbourg", "desc": "The grand central square beside your hotel, framed by the Aubette and lined with shops — the city’s natural meeting point."}, {"name": "Pharmacie de l'Homme de Fer (French pharmacy haul)", "url": "https://www.google.com/maps/search/?api=1&query=Pharmacie%20de%20l%27Homme%20de%20Fer%202%20Place%20de%20l%27Homme%20de%20Fer%20Strasbourg", "address": "2 Place de l'Homme de Fer, 67000 Strasbourg", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Pharmacie%20de%20l%27Homme%20de%20Fer%202%20Place%20de%20l%27Homme%20de%20Fer%20Strasbourg", "desc": "One of Strasbourg's biggest pharmacies, with a large parapharmacy/dermocosmetics section and frequent promos — a ~6–8 min walk from Maison Rouge. Open Mon–Sat 8:30–19:30; staff speak English and German. The French-pharmacy classics: La Roche-Posay Anthelios sunscreen, Avène, Bioderma, Nuxe, Caudalie, Uriage, SVR, Embryolisse (and A313 if in stock). Ask 'Où se trouve la parapharmacie?' and look for multipacks or lots promotionnels before buying singles."}, {"name": "Pharmacie Kléber (optional — alternative)", "url": "https://www.google.com/maps/search/?api=1&query=Pharmacie%20Kleber%2049%20Rue%20du%2022%20Novembre%20Strasbourg", "address": "49 Rue du 22 Novembre, 67000 Strasbourg (by Place Kléber)", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Pharmacie%20Kleber%2049%20Rue%20du%2022%20Novembre%20Strasbourg", "desc": "A big, central parapharmacy right by Place Kléber, English spoken, low parapharmacy prices — carries the same major derm brands (Avène, La Roche-Posay, Bioderma, Nuxe, Caudalie, Uriage). A convenient alternative if the Homme de Fer is out of something; you don't need both."}, {"name": "Monoprix (Homme de Fer)", "url": "https://www.google.com/maps/search/?api=1&query=Monoprix%20Homme%20de%20Fer%20Strasbourg", "address": "Place de l'Homme de Fer / Rue du 22 Novembre, 67000 Strasbourg", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Monoprix%20Homme%20de%20Fer%20Strasbourg", "desc": "France's answer to Target, by Place de l'Homme de Fer — drugstore make-up (Bourjois Healthy Mix), groceries and edible French souvenirs (Bonne Maman flavours, Alsatian treats). Handy for last-minute beauty bits to round out the loop."}, {"name": "KIKO Milano (Grandes Arcades)", "url": "https://www.google.com/maps/search/?api=1&query=KIKO%20Milano%2020%20Rue%20des%20Grandes%20Arcades%20Strasbourg", "address": "20 Rue des Grandes Arcades, 67000 Strasbourg", "addressUrl": "https://www.google.com/maps/search/?api=1&query=KIKO%20Milano%2020%20Rue%20des%20Grandes%20Arcades%20Strasbourg", "desc": "Affordable Italian make-up — mascara, skin tints, lip oils, cream blush — often well under US prices. Use THIS central branch on Rue des Grandes Arcades (a short walk from the hotel), not the Rivétoile mall store east of the centre. Open into the evening, incl. Saturday."}]}, "callouts": [{"title": "🧴 French pharmacy — your big beauty stop", "body": "Strasbourg is the place to load up on French skincare, usually well under US prices. Hit the Pharmacie de l'Homme de Fer for La Roche-Posay sunscreen, Avène, Bioderma, Nuxe, Caudalie, Embryolisse and more — ask for the parapharmacie and check the lots promotionnels. Since this is your last full day in the EU, keep receipts for the VAT refund, validated at the France→Switzerland border tomorrow (see Day 8). Your checked bag handles the liquids."}, {"title": "💄 The 2-hour beauty loop", "body": "Three stops in a tight cluster on/around Rue des Grandes Arcades, all a short walk from Maison Rouge: Pharmacie de l'Homme de Fer (French skincare, 45–60 min) → KIKO Milano at 20 Grandes Arcades (Italian make-up, 20–30 min) → Monoprix (Bourjois + food souvenirs, 20–30 min). Use the central KIKO, not the Rivétoile mall branch. For Alsatian jam, Galeries Lafayette on Rue du 22 Novembre stocks Christine Ferber. Note: you don't need multiple pharmacies — the Homme de Fer (or Kléber) stocks all the big derm brands; only A313 availability varies."}], "eat": [{"cat": "🍽 Lunch", "rec": "Le Tire‑Bouchon or Au Brasseur", "notes": "Tarte flambée (flammekueche) — budget–mid"}, {"cat": "🍽 Dinner", "rec": "Chez Yvonne / Maison Kammerzell", "notes": "Choucroute, baeckeoffe — winstub classics"}, {"cat": "🍰 Pastry", "rec": "Pâtisserie Christian", "notes": "Kougelhopf and Alsatian cakes"}, {"cat": "☕ Coffee", "rec": "Café Bretelles", "notes": "Strong local roaster"}, {"cat": "🍽 Special", "rec": "Au Crocodile", "notes": "Michelin dining — reserve well ahead"}], "foods": [{"name": "Choucroute garnie", "desc": "Wine‑braised sauerkraut piled with sausages and smoked pork — the Alsatian feast."}, {"name": "Baeckeoffe", "desc": "A slow‑baked casserole of marinated meats and potatoes in a sealed clay pot."}, {"name": "Tarte flambée", "desc": "Order it the local way — sweet versions (apple, cinnamon) make a fine dessert too."}, {"name": "Munster cheese", "desc": "Pungent washed‑rind cheese from the Vosges, often with cumin."}, {"name": "Bretzel & Crémant d’Alsace", "desc": "A pretzel and a glass of Alsatian sparkling — the easy aperitif."}], "good": {"photo": "Petite France canals; cathedral facade & spire; view from the Barrage Vauban terrace; sunset from the Barrage Vauban terrace (~9:15–9:30 PM)", "coffee": "Café Bretelles; Oh My Goodness", "restrooms": "Cathedral square, Palais Rohan, Petite France (some paid)", "rainy": "Palais Rohan museums; the covered Batorama boat runs rain or shine", "packing": "Reusable water bottle; it’s the warmest stretch of the trip."}}, {"n": 10, "weekday": "Sunday", "date": "July 19", "iso": "2026-07-19", "short": "Sun, Jul 19", "headline": "Private Driver → Zurich + First Look", "subtitle": "Cross into Switzerland · afternoon in the old town", "overview": "A short, scenic transfer brings you into Switzerland. After checking in, ease into Zurich on foot — the Bahnhofstrasse, the lake, and the twin‑church old town are all a few minutes apart. Note: shops are largely closed on Sundays, but sights, cafes and the lakefront are open.", "weather": "July avg ~24°C / 75°F", "walking": "~4 km, easy with a couple of gentle hills", "transport": "Private driver (booked) Strasbourg → Zurich (~2–2.5 hr)", "schedule": [{"time": "9:45", "plan": "Bags down, lobby of Maison Rouge"}, {"time": "10:00", "plan": "Private driver pickup; FR→CH border crossing"}, {"time": "~12:30", "plan": "Arrive Zurich Marriott; check in / drop bags"}, {"time": "1:30", "plan": "Lunch near the river"}, {"time": "2:30", "plan": "Old town walk (below)"}, {"time": "5:30", "plan": "Lake Zurich promenade"}, {"time": "Evening", "plan": "Dinner — Zürcher Geschnetzeltes"}], "tour": {"intro": "An afternoon loop from the hotel across the Limmat into the old town and down to the lake.", "stops": [{"name": "Bahnhofstrasse", "url": "https://www.google.com/maps/search/?api=1&query=Bahnhofstrasse%20Zurich", "address": "Bahnhofstrasse, 8001 Zürich", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Bahnhofstrasse%20Zurich", "desc": "Switzerland’s famous shopping boulevard running from the main station to the lake (windows only on Sundays, but a lovely stroll). Confiserie Sprüngli at Paradeplatz is the spot for Luxemburgerli macarons."}, {"name": "Lindenhof", "url": "https://www.google.com/maps/search/?api=1&query=Lindenhof%20Zurich", "address": "Lindenhof, 8001 Zürich", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Lindenhof%20Zurich", "desc": "A quiet tree‑shaded hilltop terrace on the site of the Roman fort, with one of the best free views over the rooftops, the river and the Grossmünster."}, {"name": "Fraumünster", "url": "https://www.google.com/maps/search/?api=1&query=Fraumunster%20Zurich", "address": "Münsterhof 2, 8001 Zürich", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Fraumunster%20Zurich", "desc": "A 9th‑century church famed for its luminous stained‑glass windows by Marc Chagall and Augusto Giacometti — small but unforgettable."}, {"name": "Grossmünster", "url": "https://www.google.com/maps/search/?api=1&query=Grossmunster%20Zurich", "address": "Grossmünsterplatz, 8001 Zürich", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Grossmunster%20Zurich", "desc": "Zurich’s landmark twin‑towered Romanesque church and cradle of the Swiss Reformation. Climb the Karlsturm tower for a close‑up view over the old town and lake."}, {"name": "Niederdorf (Old Town)", "url": "https://www.google.com/maps/search/?api=1&query=Niederdorf%20Zurich%20old%20town", "address": "Niederdorfstrasse, 8001 Zürich", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Niederdorf%20Zurich%20old%20town", "desc": "The car‑free lanes east of the river — cafes, fountains, little shops and Sunday‑open restaurants. The heart of old Zurich for an evening wander."}, {"name": "Lake Zurich Promenade", "url": "https://www.google.com/maps/search/?api=1&query=Lake%20Zurich%20Burkliplatz%20promenade", "address": "Bürkliplatz, 8001 Zürich", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Lake%20Zurich%20Burkliplatz%20promenade", "desc": "Where Bahnhofstrasse meets the water — a wide promenade with Alp views on clear days. A short boat hop is a nice option if you have energy."}, {"name": "Läderach (chocolate)", "url": "https://www.google.com/maps/search/?api=1&query=Laderach%20Bahnhofstrasse%20Zurich", "address": "Bahnhofstrasse, Zürich (also inside Zürich HB)", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Laderach%20Bahnhofstrasse%20Zurich", "desc": "The top chocolate pick — fresh 'FrischSchoggi' broken from big slabs, plus truffles and pralines. On Bahnhofstrasse, with a branch inside Zürich Hauptbahnhof open daily. Buy on your departure day so it travels fresh."}, {"name": "Confiserie Sprüngli (chocolate & Luxemburgerli)", "url": "https://www.google.com/maps/search/?api=1&query=Confiserie%20Sprungli%20Paradeplatz%20Zurich", "address": "Paradeplatz, Bahnhofstrasse 21, 8001 Zürich", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Confiserie%20Sprungli%20Paradeplatz%20Zurich", "desc": "The Zürich institution at Paradeplatz — pralines, truffles and the famous Luxemburgerli mini-macarons (delicate: eat within a day or two, before flying). Also has a Zürich HB branch open daily."}, {"name": "Migros / Coop (optional — Swiss supermarket gifts)", "url": "https://www.google.com/maps/search/?api=1&query=Migros%20Zurich%20Bahnhofstrasse", "address": "Zürich (Bahnhofstrasse & inside Zürich HB)", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Migros%20Zurich%20Bahnhofstrasse", "desc": "The cheap-and-cheerful Swiss souvenir run: Ovomaltine crunchy cream & bars, Aromat seasoning, Ragusa & Frey chocolate (Migros), Kägi wafers, Zweifel chips, Rivella, Swiss herb teas, Rösti mixes, fondue packets and vacuum-packed cheese. The Coop/Migros branches inside Zürich Hauptbahnhof open daily, including Sunday."}, {"name": "Globus (optional — department store)", "url": "https://www.google.com/maps/search/?api=1&query=Globus%20Bahnhofstrasse%20Zurich", "address": "Bahnhofstrasse 9, 8001 Zürich", "addressUrl": "https://www.google.com/maps/search/?api=1&query=Globus%20Bahnhofstrasse%20Zurich", "desc": "An upscale one-stop on Bahnhofstrasse — beauty brands (Weleda, luxury lines), a renowned food hall/delicatessen for Swiss chocolate, cheese and gourmet gifts, plus homeware and souvenirs, all under one roof. Closed Sundays; best on your Tuesday departure morning."}]}, "callouts": [{"title": "Border & money note", "body": "Crossing into Switzerland you leave the EU — keep passports handy and finalize any EU VAT refund at the border. Switzerland uses Swiss francs (CHF), not euros; cards are widely accepted, and it’s noticeably pricier than the rest of the trip."}, {"title": "🍫 Chocolate & Swiss haul — timing", "body": "Bahnhofstrasse's shops (Läderach & Sprüngli flagships, Globus, the boutique chocolatiers) are closed on your Sunday arrival — but Zürich Hauptbahnhof (ShopVille) is open 365 days: Läderach Sun 09:00–20:00, several Sprüngli branches from ~8–9am, plus Coop/Migros for the grocery haul. Best plan: buy chocolate on your departure day (Tue) so it's freshest — the station opens early daily, and the airport has Läderach, Sprüngli, Lindt & Victorinox if your morning is tight. Eat any Luxemburgerli before you fly. Chocolate boutiques to browse if you have time: Teuscher, Honold and Max Chocolatier."}], "eat": [{"cat": "🍽 Lunch", "rec": "Zeughauskeller (Bahnhofstrasse 28a)", "notes": "Hearty Swiss in a historic armory — mid"}, {"cat": "🍫 Treat", "rec": "Confiserie Sprüngli (Paradeplatz)", "notes": "Luxemburgerli macarons"}, {"cat": "🍽 Dinner", "rec": "Swiss Chuchi (Adler) or Le Dézaley", "notes": "Fondue & Zürcher Geschnetzeltes"}, {"cat": "🍽 Special", "rec": "Kronenhalle", "notes": "Classic grand restaurant with art on the walls — reserve"}], "foods": [{"name": "Zürcher Geschnetzeltes", "desc": "Zurich’s signature — sliced veal in a creamy white‑wine mushroom sauce, with rösti."}, {"name": "Rösti", "desc": "A golden pan‑fried potato cake, crisp outside and tender within."}, {"name": "Luxemburgerli", "desc": "Sprüngli’s feather‑light mini‑macarons at Paradeplatz — a Zurich must."}, {"name": "Swiss chocolate", "desc": "Lindt, Sprüngli and more — worldwide famous and at its freshest here."}], "good": {"photo": "Lindenhof viewpoint; Grossmünster towers; the lake at Bürkliplatz", "coffee": "Café Schober (old town); Sprüngli", "restrooms": "Station, churches, lakefront (clean, sometimes paid)", "rainy": "Swiss National Museum (by the station), Fraumünster, Kunsthaus art museum", "packing": "A few CHF in cash for small purchases; tomorrow is the mountain — layers ready."}}, {"n": 11, "weekday": "Monday", "date": "July 20", "iso": "2026-07-20", "short": "Mon, Jul 20", "headline": "Lucerne & Mount Rigi", "subtitle": "Old town · lake cruise · cogwheel railway to the summit", "overview": "The grand finale: medieval Lucerne, a cruise across the Lake of the Four Cantons, and Europe’s first mountain railway up the “Queen of the Mountains.” Buy the Rigi day ticket (boat + cogwheel) and let the timetable shape the day. The summit is cool even in July — pack layers.", "weather": "Lucerne ~24°C / 75°F · Rigi summit ~12–15°C / 54–59°F", "walking": "~4–5 km in town + easy mountain paths", "transport": "Driver or train to Lucerne; lake boat (SGV) + Rigi cogwheel railway", "schedule": [{"time": "8:00", "plan": "Depart Zurich (private driver or train Zürich HB → Luzern ~45 min)"}, {"time": "9:30", "plan": "Lucerne old town — Chapel Bridge & Lion Monument"}, {"time": "12:00", "plan": "Lunch in the old town"}, {"time": "~1:00", "plan": "Boat from Lucerne Pier 1 across the lake to Vitznau"}, {"time": "~2:00", "plan": "Cogwheel railway Vitznau → Rigi Kulm (summit)"}, {"time": "3:00", "plan": "Summit views (13 lakes!) & a short walk"}, {"time": "~5:00", "plan": "Descend by cogwheel / cable car"}, {"time": "Evening", "plan": "D /* trip-day logic */
function tripDayNumber(now=new Date()){
  const start=new Date(2026,6,10), end=new Date(2026,6,21);
  const d0=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  if(d0<start) return {state:"before", n:1, days:Math.round((start-d0)/864e5)};
  if(d0>end)   return {state:"after",  n:12};
  return {state:"during", n:Math.round((d0-start)/864e5)+1};
}

function renderTabs(){
  const bar=$("#tabbar"); bar.innerHTML="";
  TABS.forEach(t=>{
    const b=document.createElement("button");
    b.className="tab"+(state.tab===t.id?" active":"");
    b.innerHTML='<svg viewBox="0 0 24 24" class="ti">'+t.svg+'</svg><span class="tl">'+t.label+'</span>';
    b.onclick=()=>{ if(t.id==="days"){state.day=null;} go(t.id); };
    bar.appendChild(b);
  });
}

/* ====================== COMPONENTS ====================== */
function calloutHTML(c){
  return '<div class="callout"><div class="bar"></div><div><div class="ttl">'+esc(c.title)+'</div>'+
    (c.body?'<div class="bd">'+esc(c.body)+'</div>':'')+'</div></div>';
}
function quickFacts(d){
  let cells="";
  if(d.walking) cells+='<div><div class="k">On foot</div><div class="v">'+esc(d.walking)+'</div></div>';
  if(d.transport) cells+='<div><div class="k">Transport</div><div class="v">'+esc(d.transport)+'</div></div>';
  return cells?'<div class="quick">'+cells+'</div>':"";
}

/* ====================== VIEW: TODAY ====================== */
function viewToday(){
  const t=tripDayNumber();
  const n=t.n, d=DATA.days[n-1], leg=legOfDay(n);
  setAccent(leg.color); setLegPill(leg);
  let status, road=esc(d.subtitle);
  if(t.state==="before"){ status='<span class="blink"></span> '+t.days+' day'+(t.days===1?'':'s')+' to departure'; }
  else if(t.state==="after"){ status='<span class="blink"></span> Trip complete · safe travels home'; }
  else { status='<span class="blink"></span> Day '+n+' of 12 · live'; }

  let callouts = (d.callouts||[]).map(calloutHTML).join("");

  // schedule
  let tt = d.schedule.map(r=>'<div class="tt-row"><div class="tt-time">'+esc(r.time)+'</div><div class="tt-plan">'+esc(r.plan)+'</div></div>').join("");

  let html='<section class="view">';
  html+='<div class="board"><div class="inner">'+
    '<div class="status">'+status+'</div>'+
    '<div class="bigdate">'+esc(d.weekday)+', '+esc(d.date)+'</div>'+
    '<h1>'+esc(d.headline)+'</h1>'+
    (road?'<div class="road">'+road+'</div>':'')+
    '<div class="legrow"><span class="tag"><span class="ic">'+leg.flag+'</span>'+esc(leg.name)+'</span>'+
      (d.weather?'<span class="tag"><span class="ic">'+ICON.weather+'</span>'+esc(d.weather)+'</span>':'')+'</div>'+
    quickFacts(d)+
    '<div class="flipgo"><button class="btn primary" onclick="go(\'days\',{day:'+n+'})">Open full day →</button>'+
      (t.state==="before"?'<button class="btn ghost" onclick="go(\'pack\')">Packing</button>':'')+'</div>'+
    '</div></div>';

  if(t.state==="before"){
    html+='<div class="section-head"><div class="eyebrow">Before you fly</div><div class="h-section">Get set</div></div>';
    html+='<div class="card pad note-soft">Your trip runs <b>July 10–21, 2026</b>: Brussels → Bruges &amp; Ghent → Luxembourg &amp; Vianden → Strasbourg &amp; Colmar → Zurich, Lucerne &amp; Mount Rigi. Tap <b>Days</b> to preview any day, <b>Pack</b> to tick off your bags, and <b>Info</b> for emergency numbers and money tips. Everything works offline once this page has loaded — add it to your home screen.</div>';
    if(DATA.glance.key && DATA.glance.key.length){
      html+='<div class="section-head"><div class="eyebrow">Locked in</div><div class="h-section">Confirmed</div></div><div class="card pad"><div class="gk">'+
        DATA.glance.key.map(k=>'<div class="gk-v" style="margin-top:0">• '+esc(k.replace(/\.$/,''))+'</div>').join("")+'</div></div>';
    }
  } else {
    if(callouts){ html+='<div class="section-head"><div class="eyebrow">Heads up</div><div class="h-section">Don’t miss</div></div>'+callouts; }
    html+='<div class="section-head"><div class="eyebrow">Departure board</div><div class="h-section">Today’s plan</div></div>';
    html+='<div class="card pad"><div class="timetable">'+(tt||'<div class="note-soft">A relaxed, unscheduled day.</div>')+'</div></div>';
    html+='<div class="flipgo" style="margin-top:14px"><button class="btn primary block" onclick="go(\'days\',{day:'+n+'})">See walking tour, dining &amp; tips →</button></div>';
  }
  html+='</section>';
  return html;
}

/* ====================== VIEW: DAYS (list + detail) ====================== */
function viewDays(){
  if(state.day){ return viewDayDetail(state.day); }
  const todayN=tripDayNumber().n, tstate=tripDayNumber().state;
  setAccent(LEGS.transit.color); setLegPill(LEGS.transit);
  let html='<section class="view"><div class="section-head"><div class="eyebrow">11 nights · 4 countries</div><div class="h-section">The itinerary</div><div class="sub">July 10–21, 2026. Tap a day for its hour-by-hour plan, self-guided walk and dining.</div></div>';
  DATA.days.forEach(d=>{
    const leg=legOfDay(d.n);
    const isToday=(tstate==="during"&&d.n===todayN);
    html+='<a class="card daycard" href="#" onclick="go(\'days\',{day:'+d.n+'});return false" style="--accent:'+leg.color+'">'+
      '<span class="stripe"></span><div class="dc-in">'+
      '<div class="dc-top"><span class="dnum">DAY '+d.n+'</span><span class="ddate">'+esc(d.short)+'</span>'+
        (isToday?'<span class="today-badge">Today</span>':'')+'<span style="margin-left:auto">'+leg.flag+'</span></div>'+
      '<div class="dhead">'+esc(d.headline)+'</div>'+
      (d.subtitle?'<div class="dsub">'+esc(d.subtitle)+'</div>':'')+
      '</div><div class="chev">›</div></a>';
  });
  html+='</section>';
  return html;
}

function viewDayDetail(n){
  const d=DATA.days[n-1], leg=legOfDay(n);
  setAccent(leg.color); setLegPill(leg);
  const prev=n>1?n-1:null, next=n<12?n+1:null;
  let html='<section class="view">';
  html+='<div class="detail-bar"><button class="backbtn" onclick="go(\'days\',{day:null})">‹ All days</button>'+
    '<div class="dstep"><button onclick="go(\'days\',{day:'+prev+'})" '+(prev?'':'disabled')+'>‹</button>'+
    '<button onclick="go(\'days\',{day:'+next+'})" '+(next?'':'disabled')+'>›</button></div></div>';

  // header card
  html+='<div class="card pad" style="border-top:4px solid var(--accent)">'+
    '<div class="dc-top" style="display:flex;align-items:center;gap:8px"><span class="dnum">DAY '+n+'</span>'+
      '<span class="ddate">'+esc(d.weekday)+', '+esc(d.date)+'</span><span style="margin-left:auto;font-size:18px">'+leg.flag+'</span></div>'+
    '<h1 style="font-family:var(--serif);font-size:24px;font-weight:600;margin:9px 0 0;line-height:1.15">'+esc(d.headline)+'</h1>'+
    (d.subtitle?'<div class="sub" style="margin-top:6px">'+esc(d.subtitle)+'</div>':'')+
    (d.overview?'<p style="font-size:14px;line-height:1.6;margin:12px 0 0;color:var(--ink)">'+esc(d.overview)+'</p>':'')+
    '<div class="legrow" style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">'+
      (d.weather?'<span class="chip flat">'+ICON.weather+' '+esc(d.weather)+'</span>':'')+
      (d.walking?'<span class="chip flat">'+ICON.walk+' '+esc(d.walking)+'</span>':'')+
      (d.transport?'<span class="chip flat">'+ICON.train+' '+esc(d.transport)+'</span>':'')+
    '</div></div>';

  // callouts
  (d.callouts||[]).forEach(c=>{ html+=calloutHTML(c); });

  // schedule
  if(d.schedule.length){
    html+='<div class="section-head"><div class="eyebrow">Departure board</div><div class="h-section">Hour by hour</div></div>';
    html+='<div class="card pad"><div class="timetable">'+
      d.schedule.map(r=>'<div class="tt-row"><div class="tt-time">'+esc(r.time)+'</div><div class="tt-plan">'+esc(r.plan)+'</div></div>').join("")+
      '</div></div>';
  }

  // walking tour
  if(d.tour && d.tour.stops.length){
    html+='<div class="section-head"><div class="eyebrow">Self-guided · '+d.tour.stops.filter(s=>!s.transit).length+' stops</div><div class="h-section">Walking tour</div>'+
      (d.tour.intro?'<div class="sub">'+esc(d.tour.intro)+'</div>':'')+'</div>';
    html+='<div class="card">';
    let stopNo=0;
    d.tour.stops.forEach((s,i)=>{
      if(s.transit){
        html+='<div class="leg"><div class="leg-ic">🚆</div><div class="leg-body">'+
          '<div class="leg-name">'+esc(s.name)+'</div>'+
          (s.desc?'<div class="leg-desc">'+esc(s.desc)+'</div>':'')+
          (s.url?'<div style="margin-top:8px"><a class="maplink" target="_blank" rel="noopener" href="'+esc(s.url)+'">📍 Open in Maps</a></div>':'')+
        '</div></div>';
        return;
      }
      stopNo++;
      const seenKey="seen:"+n+":"+i, seen=store.get(seenKey,false);
      html+='<div class="stop'+(seen?' seen':'')+'"><div class="num">'+stopNo+'</div><div class="body">'+
        '<div class="name">'+esc(s.name)+'</div>'+
        (s.desc?'<div class="desc">'+esc(s.desc)+'</div>':'')+
        '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center">'+
          (s.url?'<a class="maplink" target="_blank" rel="noopener" href="'+esc(s.url)+'">📍 Open in Maps</a>':'')+
          '<button class="seentog'+(seen?' on':'')+'" data-k="'+seenKey+'" onclick="toggleSeen(this)"><span class="sbox">✓</span>Seen</button>'+
        '</div>'+
        (s.address?'<div class="note-soft" style="margin-top:7px">'+esc(s.address)+'</div>':'')+
      '</div></div>';
    });
    html+='</div>';
  }

  // eat
  if(d.eat.length){
    html+='<div class="section-head"><div class="eyebrow">Breakfast to nightcap</div><div class="h-section">Where to eat</div></div><div class="card pad">';
    d.eat.forEach(e=>{ html+='<div class="eat-row"><div class="eat-cat">'+esc(e.cat)+'</div><div class="eat-rec">'+esc(e.rec)+'</div>'+
      (e.notes?'<div class="eat-note">'+esc(e.notes)+'</div>':'')+'</div>'; });
    html+='</div>';
  }

  // foods
  if(d.foods.length){
    html+='<div class="section-head"><div class="eyebrow">Order this</div><div class="h-section">Taste today</div></div><div class="card pad"><div class="foodlist">'+
      d.foods.map(f=>'<div class="food"><div class="fn">'+esc(f.name)+'</div><div class="fd">'+esc(f.desc)+'</div></div>').join("")+'</div></div>';
  }

  // good to know
  const g=d.good||{};
  const gkmap=[["photo","📷 Photo spots"],["coffee","☕ Coffee"],["restrooms","🚻 Restrooms"],["rainy","☔ Rainy backup"],["packing","🧳 Day-bag reminder"]];
  const gkrows=gkmap.filter(([k])=>g[k]).map(([k,lab])=>'<div><div class="gk-k">'+lab+'</div><div class="gk-v">'+esc(g[k])+'</div></div>');
  if(gkrows.length){
    html+='<div class="section-head"><div class="eyebrow">Good to know</div><div class="h-section">On the ground</div></div><div class="card pad"><div class="gk">'+gkrows.join("")+'</div></div>';
  }

  // notes
  const key="note:day:"+n;
  html+='<div class="section-head"><div class="eyebrow">Your day</div><div class="h-section">Notes</div></div>'+
    '<textarea class="notes" placeholder="Reservations, table times, memories…" oninput="store.set(\''+key+'\',this.value)">'+esc(store.get(key,""))+'</textarea>';

  // bottom nav
  html+='<div class="flipgo" style="margin-top:18px">'+
    (prev?'<button class="btn ghost" style="--accent:'+leg.color+';background:var(--paper-2);color:var(--accent);border:1px solid var(--line)" onclick="go(\'days\',{day:'+prev+'})">‹ Day '+prev+'</button>':'')+
    (next?'<button class="btn primary block" onclick="go(\'days\',{day:'+next+'})">Day '+next+' →</button>':'<button class="btn ghost block" style="background:var(--paper-2);color:var(--accent);border:1px solid var(--line)" onclick="go(\'days\',{day:null})">Back to all days</button>')+
  '</div>';

  html+='</section>';
  return html;
}

    const fc=DATA.foods.find(f=>f.country===FOODS_BY_LEG[legkey]);

        fc.items.map(f=>'<div class="food"><div class="fn">'+esc(f.name)+'</div><div class="fd">'+esc(f.desc)+'</div></div>').join("")+'</div>';

/* ====================== VIEW: PACK ====================== */
function packBody(){
  let total=0,done=0;
  DATA.packing.forEach((p,pi)=>p.items.forEach((_,ii)=>{ total++; if(store.get("pk:"+pi+":"+ii,false))done++; }));
  let html='<div class="card pad" style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-weight:600;font-size:14px">Overall</span><span class="pricetag" id="pkOverall">'+done+' / '+total+'</span></div><div class="progress"><i id="pkBar" style="width:'+(total?Math.round(done/total*100):0)+'%"></i></div></div>';
  DATA.packing.forEach((p,pi)=>{
    let pdone=p.items.filter((_,ii)=>store.get("pk:"+pi+":"+ii,false)).length;
    html+='<details class="acc" '+(pi===0?'open':'')+'><summary><div><div class="city-name" style="font-size:16px">'+esc(p.title)+'</div>'+
      '<div class="city-meta" id="pkc'+pi+'">'+pdone+' of '+p.items.length+' packed</div></div><span class="mk">›</span></summary><div class="acc-body" style="padding-top:4px">';
    p.items.forEach((it,ii)=>{
      const on=store.get("pk:"+pi+":"+ii,false);
      html+='<div class="check'+(on?' on':'')+'" data-pi="'+pi+'" data-ii="'+ii+'" onclick="togglePack(this)"><div class="box">✓</div><div class="lbl">'+esc(it)+'</div></div>';
    });
    html+='</div></details>';
  });
  html+='<button class="btn ghost block" style="margin-top:6px;background:var(--paper-2);color:var(--accent);border:1px solid var(--line)" onclick="resetPack()">Reset all checklists</button>';
  return html;
}
function recalcPack(){
  let total=0,done=0;
  DATA.packing.forEach((p,pi)=>{ let pd=0; p.items.forEach((_,ii)=>{ total++; const v=store.get("pk:"+pi+":"+ii,false); if(v){done++;pd++;} });
    const c=$("#pkc"+pi); if(c)c.textContent=pd+" of "+p.items.length+" packed"; });
  const b=$("#pkBar"), o=$("#pkOverall");
  if(b)b.style.width=(total?Math.round(done/total*100):0)+"%";
  if(o)o.textContent=done+" / "+total;
}
window.togglePack=function(el){
  const pi=el.dataset.pi, ii=el.dataset.ii, key="pk:"+pi+":"+ii;
  const v=!store.get(key,false); store.set(key,v); el.classList.toggle("on",v); recalcPack();
};
window.resetPack=function(){
  if(!confirm("Uncheck every item on all five lists?"))return;
  DATA.packing.forEach((p,pi)=>p.items.forEach((_,ii)=>store.set("pk:"+pi+":"+ii,false)));
  render();
};

/* ====================== VIEW: SHOP ====================== */
function shopBody(){
  const lists=SHOPPING.lists;
  const cur=lists.find(l=>l.id===state.shopList)||lists[0];
  let total=0,done=0;
  cur.tiers.forEach((t,ti)=>t.items.forEach((_,ii)=>{ total++; if(store.get("buy:"+cur.id+":"+ti+":"+ii,false))done++; }));
  let html='<div class="seg">';
  lists.forEach(l=>{ html+='<button class="'+(l.id===cur.id?"on":"")+'" onclick="switchShop(\''+l.id+'\')">'+esc(l.label)+'</button>'; });
  html+='</div>';
  html+='<div class="note-soft" style="margin:-2px 0 12px">'+esc(cur.note)+'. Tap an item for price &amp; details.</div>';
  html+='<div class="card pad" style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-weight:600;font-size:14px">'+esc(cur.label)+'</span><span class="pricetag" id="buyOverall">'+done+' / '+total+'</span></div><div class="progress"><i id="buyBar" style="width:'+(total?Math.round(done/total*100):0)+'%"></i></div></div>';
  cur.tiers.forEach((t,ti)=>{
    html+='<div class="tier-head">'+esc(t.title)+'</div>';
    t.items.forEach((it,ii)=>{
      const key="buy:"+cur.id+":"+ti+":"+ii, on=store.get(key,false);
      html+='<div class="check'+(on?" on":"")+'" onclick="toggleDetails(this)"><div class="box" data-k="'+key+'" onclick="toggleBuy(this,event)">✓</div><div class="lbl">'+esc(it.n)+'</div><span class="mk">›</span></div>';
      let det=''; if(it.p)det+='<span class="pricetag">'+esc(it.p)+'</span> ';
      if(it.d)det+=esc(it.d);
      if(it.s)det+=' <b>Shade:</b> '+esc(it.s);
      html+='<div class="buydetails">'+det+'</div>';
    });
  });
  html+='<div style="display:flex;gap:8px;margin-top:14px"><button class="btn primary" id="copyBuyBtn" onclick="copyBuyList()">Copy list</button><button class="btn ghost" style="background:var(--paper-2);color:var(--accent);border:1px solid var(--line)" onclick="resetBuy()">Reset this list</button></div>';
  html+='<div class="note-soft" style="margin-top:10px">Prices are rough guides (€ in France · CHF in Switzerland) and vary by size and shop.</div>';
  html+='<textarea id="buyBox" class="notes" readonly style="display:none;margin-top:10px;min-height:150px" onclick="this.select()"></textarea>';
  return html;
}
function viewLists(){
  const shop=SHOPPING.lists.find(l=>l.id===state.shopList)||SHOPPING.lists[0];
  setAccent(state.listMode==="shop"?shop.accent:LEGS.transit.color);
  setLegPill({name:"Lists",flag:"📝"});
  let html='<section class="view"><div class="section-head"><div class="eyebrow">Tick off as you go</div><div class="h-section">Lists</div><div class="sub">Packing &amp; shopping, saved on this device.</div></div>';
  html+='<div class="seg"><button class="'+(state.listMode==="pack"?"on":"")+'" onclick="switchListMode(\'pack\')">🧳 Packing</button><button class="'+(state.listMode==="shop"?"on":"")+'" onclick="switchListMode(\'shop\')">🛍️ Shopping</button></div>';
  html+=(state.listMode==="shop")?shopBody():packBody();
  html+='</section>';
  return html;
}
window.switchListMode=function(m){ state.listMode=m; render(); window.scrollTo({top:0}); };
window.toggleDetails=function(el){ el.classList.toggle("open"); };
window.switchShop=function(id){ state.shopList=id; render(); window.scrollTo({top:0}); };
window.toggleBuy=function(box,ev){ if(ev)ev.stopPropagation(); const k=box.dataset.k, v=!store.get(k,false); store.set(k,v); const row=box.closest(".check"); if(row)row.classList.toggle("on",v); recalcBuy(); };
function recalcBuy(){
  const cur=SHOPPING.lists.find(l=>l.id===state.shopList); if(!cur)return;
  let total=0,done=0; cur.tiers.forEach((t,ti)=>t.items.forEach((_,ii)=>{ total++; if(store.get("buy:"+cur.id+":"+ti+":"+ii,false))done++; }));
  const b=$("#buyBar"),o=$("#buyOverall"); if(b)b.style.width=(total?Math.round(done/total*100):0)+"%"; if(o)o.textContent=done+" / "+total;
}
window.resetBuy=function(){
  const cur=SHOPPING.lists.find(l=>l.id===state.shopList); if(!cur)return;
  if(!confirm("Uncheck every item on the "+cur.label+" list?"))return;
  cur.tiers.forEach((t,ti)=>t.items.forEach((_,ii)=>store.set("buy:"+cur.id+":"+ti+":"+ii,false)));
  render();
};
function buildBuyList(){
  const cur=SHOPPING.lists.find(l=>l.id===state.shopList); if(!cur)return "";
  let L=[cur.label+" — shopping list",""];
  cur.tiers.forEach((t,ti)=>{ L.push(t.title); t.items.forEach((it,ii)=>{ const on=store.get("buy:"+cur.id+":"+ti+":"+ii,false); L.push("  ["+(on?"x":" ")+"] "+it); }); L.push(""); });
  return L.join("\n");
}
window.copyBuyList=function(){
  const txt=buildBuyList(), box=$("#buyBox");
  const reveal=()=>{ if(box){ box.style.display="block"; box.value=txt; box.focus(); box.select(); } };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>{ const b=$("#copyBuyBtn"); if(b){ const o=b.textContent; b.textContent="Copied ✓"; setTimeout(()=>b.textContent=o,1600); } }).catch(reveal);
  } else reveal();
};

/* ---- Seen check-offs + export ---- */
window.toggleSeen=function(el){
  const k=el.dataset.k, v=!store.get(k,false);
  store.set(k,v); el.classList.toggle("on",v);
  const stop=el.closest(".stop"); if(stop)stop.classList.toggle("seen",v);
};
function buildTripLog(){
  const M=DATA.meta; let L=[], seenCount=0;
  L.push(M.title+" — "+M.subtitle);
  L.push(M.dates);
  L.push("Places seen (exported "+new Date().toLocaleDateString()+")");
  L.push("");
  DATA.days.forEach(d=>{
    const stops=(d.tour&&d.tour.stops)||[];
    const seen=stops.filter((s,i)=>store.get("seen:"+d.n+":"+i,false));
    const note=(store.get("note:day:"+d.n,"")||"").trim();
    if(seen.length||note){
      L.push("DAY "+d.n+" · "+d.short+" — "+d.headline);
      seen.forEach(s=>{ L.push("  \u2713 "+s.name); seenCount++; });
      if(note) L.push("  \u270e Notes: "+note.replace(/\n/g,"\n     "));
      L.push("");
    }
  });
  if(!seenCount && !L.some(x=>x.startsWith("  \u270e"))) L.push("(Nothing checked off yet — tap \u201cSeen\u201d on places as you visit them.)");
  else L.splice(3,0,"Total places checked off: "+seenCount,"");
  return L.join("\n");
}
window.exportTrip=function(mode){
  const txt=buildTripLog(), box=$("#exportBox");
  const reveal=()=>{ if(box){ box.style.display="block"; box.value=txt; box.focus(); box.select(); } };
  if(mode==="show"){ reveal(); return; }
  if(mode==="copy"){
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(()=>flashBtn("Copied \u2713")).catch(reveal);
    } else reveal();
    return;
  }
  if(mode==="download"){
    try{
      const blob=new Blob([txt],{type:"text/plain;charset=utf-8"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a"); a.href=url; a.download="europe-2026-places-seen.txt";
      document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500);
    }catch(e){ reveal(); }
  }
};
function flashBtn(msg){
  const b=$("#copyLogBtn"); if(!b)return; const o=b.textContent; b.textContent=msg;
  setTimeout(()=>{ b.textContent=o; },1800);
}

    html+='<div class="card pad" style="margin-bottom:10px"><div style="font-family:var(--serif);font-size:16px;font-weight:600;line-height:1.2">'+esc(dr.title)+'</div>'+

/* ====================== RENDER ====================== */
function render(){
  renderTabs();
  const app=$("#app");
  let html="";
  switch(state.tab){
    case "today": html=viewToday(); break;
    case "days":  html=viewDays();  break;
    case "places":html=viewPlaces();break;
    case "lists": html=viewLists(); break;
    case "info":  html=viewInfo();  break;
  }
  app.innerHTML=html;
  // storage warning note (only if storage unavailable, shown on info)
  const sn=$("#storeNote");
  if(sn){
    if(store.ok){ sn.className="card pad note-soft"; sn.innerHTML='✓ Your “Seen” places, notes and packing checkmarks save automatically on this device (each traveler keeps their own). To keep them, open this guide from the same browser. <b>Add to Home Screen</b> for an app-like, offline copy.'; }
    else { sn.className="card pad note-soft"; sn.style.borderColor="#d8b24a"; sn.innerHTML='⚠︎ Saving is disabled in this preview, so checkmarks and notes won’t persist. They’ll work normally once this file is opened from a hosted link (e.g. GitHub Pages) or saved to your device.'; }
  }
}
